<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO STORE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6}

/* TOP */
.topbar{
background:#16a34a;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
font-weight:bold;
}

/* SIDEBAR */
.sidebar{
position:fixed;
right:0;top:0;
width:260px;height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
padding:15px;
z-index:999;
}
.sidebar.open{transform:translateX(0)}

.menu-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.app{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
position:relative;
}

.heart{
position:absolute;
top:5px;left:5px;
color:#aaa;
cursor:pointer;
}
.heart.active{color:red}

/* BOX */
.box{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
<div onclick="toggleSidebar()">☰ MENU</div>
<div id="balanceTop">0$</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menu-item" onclick="show('home')">🏠 الرئيسية</div>
<div class="menu-item" onclick="show('redeem')">💳 الشحن</div>
<div class="menu-item" onclick="show('wallet')">💼 المحفظة</div>
<div class="menu-item" onclick="show('favorites')">❤️ المفضلة</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة</h3>
<p>الوارد: <span id="income">0</span>$</p>
<p>المصروف: <span id="spent">0</span>$</p>
</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن كود 💳</h3>
<input id="code" placeholder="أدخل الكود">
<button onclick="redeem()">تفعيل</button>
</div>

<script>

/* 🔴 ضع بياناتك هنا */
const BOT_TOKEN = "PUT_BOT_TOKEN";
const CHAT_ID = "PUT_CHAT_ID";

/* DATA */
let income = JSON.parse(localStorage.getItem("income")) || 0;
let spent = JSON.parse(localStorage.getItem("spent")) || 0;
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

/* APPS */
const apps = [
{name:"يا أهلاً"},
{name:"Game"},
{name:"VIP"},
{name:"Chat"},
{name:"Soul"},
{name:"Xena"}
];

/* SAVE */
function save(){
localStorage.setItem("income",income);
localStorage.setItem("spent",spent);
localStorage.setItem("favorites",JSON.stringify(favorites));
}

/* RENDER APPS */
function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";

apps.forEach(a=>{
box.innerHTML+=`
<div class="app" onclick="buy('${a.name}')">
<div class="heart ${favorites.includes(a.name)?'active':''}"
onclick="event.stopPropagation();toggleFav('${a.name}')">❤</div>
<div>${a.name}</div>
</div>`;
});
}

/* BUY */
function buy(item){
let price = 1;

spent += price;

sendTelegram(item, price, "BUY");

update();
save();
}

/* REDEEM */
function redeem(){
let code = document.getElementById("code").value;

if(!code){alert("أدخل كود");return;}

income += 5;

sendTelegram(code, 5, "REDEEM");

update();
save();
}

/* TELEGRAM FIXED */
function sendTelegram(item,price,type){

let text = `
🛒 TYPE: ${type}
📦 ITEM: ${item}
💰 PRICE: ${price}$
`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
method: "POST",
headers: {
"Content-Type": "application/x-www-form-urlencoded"
},
body: `chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`
});

}

/* FAVORITE */
function toggleFav(name){
if(favorites.includes(name)){
favorites = favorites.filter(f=>f!==name);
}else{
favorites.push(name);
}
renderApps();
renderFav();
save();
}

/* FAVORITES LIST */
function renderFav(){
let box=document.getElementById("favList");
box.innerHTML="";

favorites.forEach(f=>{
box.innerHTML+=`<div class="box">❤️ ${f}</div>`;
});
}

/* UPDATE WALLET */
function update(){
document.getElementById("income").innerText = income;
document.getElementById("spent").innerText = spent;
document.getElementById("balanceTop").innerText = (income - spent) + "$";
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* SIDEBAR */
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

renderApps();
renderFav();
update();

</script>

</body>
</html>
