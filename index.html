<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:998;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:250px;
  height:100%;
  background:#1e1e2f;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s ease;
  z-index:999;
}

.sidebar.open{
  transform:translateX(0);
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:5px 0;
  background:#2c2c44;
  border-radius:8px;
}

/* PAGES */
.page{display:none;}
.active{display:block;}

/* GRID APPS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:linear-gradient(to left,#3498db,#2ecc71);
  color:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.icon{
  font-size:32px;
  display:block;
  margin-bottom:6px;
}

/* PACKS */
.pack-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  font-weight:bold;
}

.mas{
  font-size:16px;
  color:#2ecc71;
  margin-bottom:6px;
}

.price{
  font-size:16px;
  color:#e67e22;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>القائمة</h3>
  <a href="#">الرئيسية</a>
  <a href="#">الرصيد</a>
  <a href="#">طلباتي</a>
  <a href="#">إضافة رصيد</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- HOME -->
<div id="home" class="page active">

<div class="header">
  <div onclick="toggleSidebar()">☰</div>
  <div>الرصيد: 120$</div>
</div>

<div class="grid">

  <div class="card" onclick="openApp('yaahlan')"><span class="icon">💎</span>يا أهلا</div>
  <div class="card" onclick="openApp('xena')"><span class="icon">🎮</span>Xena</div>
  <div class="card" onclick="openApp('yoparti')"><span class="icon">💬</span>YoParti</div>
  <div class="card" onclick="openApp('sugo')"><span class="icon">🎤</span>Sugo</div>
  <div class="card" onclick="openApp('4fun')"><span class="icon">🎉</span>4Fun</div>
  <div class="card" onclick="openApp('ahlan')"><span class="icon">👋</span>Ahlan Chat</div>
  <div class="card" onclick="openApp('soulchill')"><span class="icon">🌙</span>Soul Chill</div>
  <div class="card" onclick="openApp('soulstar')"><span class="icon">⭐</span>Soul Star</div>

</div>
</div>

<!-- APP PAGE -->
<div id="appPage" class="page">

<div class="header">
  <div onclick="back()">رجوع</div>
  <div id="appName"></div>
</div>

<div id="packs"></div>

</div>

<script>

/* SIDEBAR */
function toggleSidebar(){
  let sidebar = document.getElementById("sidebar");
  let overlay = document.getElementById("overlay");

  sidebar.classList.toggle("open");

  if(sidebar.classList.contains("open")){
    overlay.style.display = "block";
  }else{
    overlay.style.display = "none";
  }
}

document.getElementById("overlay").onclick = function(){
  document.getElementById("sidebar").classList.remove("open");
  this.style.display = "none";
}

/* PAGES */
function show(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function back(){
  show("home");
}

/* APPS DATA */
function openApp(app){

  show("appPage");

  let data = {
    yaahlan:{
      name:"يا أهلا - Yaahlan",
      packs:[5200,10600,27000,40000,52500]
    },
    xena:{name:"زينا - Xena", packs:[5200,10600]},
    yoparti:{name:"يو بارتي - YoParti", packs:[5200,10600]},
    sugo:{name:"سوجو - Sugo", packs:[5200,10600]},
    "4fun":{name:"فورفان - 4Fun", packs:[5200,10600]},
    ahlan:{name:"أهلن شات - Ahlan Chat", packs:[5200,10600]},
    soulchill:{name:"سول شيل - Soul Chill", packs:[5200,10600]},
    soulstar:{name:"سول ستار - Soul Star", packs:[5200,10600]}
  };

  document.getElementById("appName").innerText = data[app].name;

  let html = "<div class='pack-grid'>";

  data[app].packs.forEach(p=>{
    html += `
      <div class='pack-card'>
        <div class='mas'>${p} 💎</div>
        <div class='price'>$${getPrice(p)} 💵</div>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("packs").innerHTML = html;
}

/* PRICE MAP */
function getPrice(p){
  if(p == 5200) return 10;
  if(p == 10600) return 20;
  if(p == 27000) return 50;
  if(p == 40000) return 75;
  if(p == 52500) return 100;
  return 0;
}

</script>

</body>
  </html>
