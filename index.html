<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  right:0;
  left:0;
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.store{
  padding-top:60px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:linear-gradient(to left,#3498db,#2ecc71);
  color:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.pack-card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  text-align:center;
}
.buy-btn{
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>الرصيد: $<span id="balance">0</span></div>
<div onclick="openOrders()">طلباتي</div>
</div>

<div class="store">

<div class="grid">
<div class="card" onclick="showPacks('يا أهلا')">يا أهلا</div>
<div class="card" onclick="showPacks('Xena')">Xena</div>
<div class="card" onclick="showPacks('Sugo')">Sugo</div>
</div>

<div id="packs"></div>
</div>

<div id="orders" style="display:none"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER ID تلقائي */
let uid = localStorage.getItem("uid");

if(!uid){
uid = "user_" + Date.now();
localStorage.setItem("uid",uid);

/* إنشاء حساب */
await setDoc(doc(db,"users",uid),{
balance:100
});
}

/* تحميل الرصيد */
async function load(){
let r=await getDoc(doc(db,"users",uid));
balance.innerText=r.data().balance;
}

load();

/* عرض الباقات */
window.showPacks = (appName)=>{
packs.innerHTML=`
<div class="pack-card">
<div>2500000 ماسة</div>
<div>$5</div>
<div class="buy-btn" onclick="buy(5,'${appName}')">شراء</div>
</div>
`;
}

/* شراء */
window.buy = async(price,pack)=>{
let r=await getDoc(doc(db,"users",uid));
let bal=r.data().balance;

if(bal<price){
alert("رصيد غير كافي");
return;
}

await updateDoc(doc(db,"users",uid),{
balance:bal-price
});

await addDoc(collection(db,"orders"),{
uid,
pack,
price,
date:new Date()
});

alert("تم الشراء");
load();
}

/* طلباتي */
window.openOrders = async ()=>{
document.querySelector(".store").style.display="none";
orders.style.display="block";

let q=await getDocs(collection(db,"orders"));

let html="<h3>طلباتي</h3>";

q.forEach(d=>{
let o=d.data();
if(o.uid==uid){
html+=`<div class='pack-card'>${o.pack} - ${o.price}$</div>`;
}
});

orders.innerHTML=html;
}

</script>

</body>
</html>
