<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Store</title>

<style>
html,body{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
  padding-top:60px;
  box-sizing:border-box;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  right:0;
  left:0;
  z-index:1000;
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGIN */
.login-card{
  width:90%;
  max-width:320px;
  margin:50px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  text-align:center;
}

.login-card input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

.login-card button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.login-card button:nth-child(4){
  background:#3498db;
}

#errorBox{
  color:red;
  font-size:13px;
  margin-top:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  box-sizing:border-box;
}

.card{
  background:linear-gradient(to left,#3498db,#2ecc71);
  color:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

/* PACKS */
.pack-card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.mas{color:#2ecc71;}
.price{color:#e67e22;}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}

.modal input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>الرصيد: $<span id="balance">0</span></div>
<div onclick="openOrders()">طلباتي</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="login-card">
<h2>تسجيل الدخول</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<div id="errorBox"></div>
<button onclick="login()">دخول</button>
<button onclick="register()">تسجيل</button>
</div>

<!-- STORE -->
<div id="store" style="display:none">

<div class="grid">
<div class="card" onclick="openApp('yaahlan','يا أهلا')">يا أهلا</div>
<div class="card" onclick="openApp('xena','Xena')">Xena</div>
<div class="card" onclick="openApp('sugo','Sugo')">Sugo</div>
</div>

<div id="packs"></div>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>ID</h3>
<input id="userId">
<button onclick="confirmBuy()">تأكيد</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 Firebase */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid=null;
let selectedPack=null;
let currentApp="";

/* REGISTER */
window.register=async()=>{
let email=email.value;
let pass=pass.value;

if(email==""||pass==""){
errorBox.innerText="املأ البيانات";
return;
}

try{
let u=await createUserWithEmailAndPassword(auth,email,pass);
await setDoc(doc(db,"users",u.user.uid),{balance:100,email});
errorBox.style.color="green";
errorBox.innerText="تم التسجيل";
}catch(e){
errorBox.innerText="خطأ في التسجيل";
}
}

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,pass.value);
errorBox.innerText="تم الدخول";
}catch(e){
errorBox.innerText="خطأ في البيانات";
}
}

/* USER */
onAuthStateChanged(auth,async(user)=>{
if(user){
uid=user.uid;
loginBox.style.display="none";
store.style.display="block";
load();
}
});

async function load(){
let r=await getDoc(doc(db,"users",uid));
balance.innerText=r.data().balance;
}

/* BUY */
window.buy=async(price,pack)=>{
let r=await getDoc(doc(db,"users",uid));
let bal=r.data().balance;

if(bal<price){
alert("رصيد غير كافي");
return;
}

await updateDoc(doc(db,"users",uid),{balance:bal-price});

await addDoc(collection(db,"orders"),{
uid,pack,price,date:new Date()
});

load();
}

/* ORDERS */
window.openOrders=async()=>{
store.style.display="none";
orders.style.display="block";

let q=await getDocs(collection(db,"orders"));
let html="<h3>طلباتي</h3>";

q.forEach(d=>{
let o=d.data();
if(o.uid==uid){
html+=`<div class='pack-card'>💎 ${o.pack} - ${o.price}$</div>`;
}
});

orders.innerHTML=html;
}

</script>

</body>
</html>
