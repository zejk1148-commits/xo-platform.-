<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Store</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f5f5f5}

/* HEADER */
.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SIDEBAR */
.sidebar{
  position:fixed;top:0;right:0;width:250px;height:100%;
  background:#1e1e2f;color:white;padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:999;
}
.sidebar.open{transform:translateX(0);}
.sidebar a{
  display:block;
  padding:10px;
  margin:5px 0;
  background:#2c2c44;
  border-radius:8px;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:998;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  transition:0.2s;
}
.card:active{transform:scale(0.95);}
.card img{
  width:55px;
  height:55px;
  border-radius:12px;
  margin-bottom:5px;
}
.card-name{
  font-size:13px;
  font-weight:bold;
}

/* PACKS */
.pack-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
  text-align:center;
}
.modal input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}
.modal button{
  background:#2ecc71;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3 style="text-align:center; margin-bottom:20px;">القائمة</h3>

  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="alert('قريباً')">💰 إضافة رصيد</a>
  <a onclick="alert('قريباً')">شحن💳</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="alert('قريباً')">❤️ المفضلة</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- HOME -->
<div id="home">
<div class="header">
  <div onclick="toggleSidebar()">☰</div>
  <div>الرصيد: $120</div>
</div>

<div class="grid" id="appsGrid"></div>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none">
<div class="header">
  <div onclick="back()">رجوع</div>
  <div id="appName"></div>
</div>

<div id="packs"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>إدخال ID</h3>
    <input id="userId">
    <button onclick="confirmBuy()">تأكيد</button>
  </div>
</div>

<script>

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("open");
  overlay.style.display = sidebar.classList.contains("open") ? "block" : "none";
}
overlay.onclick = ()=>{
  sidebar.classList.remove("open");
  overlay.style.display="none";
}

/* APPS DATA */
const apps = [
{id:"yaahlan", name:"يا أهلا", img:"https://i.ibb.co/9mnxtvrG/image.png", packs:[2500,5200,10600,27000]},
{id:"xena", name:"Xena", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"sugo", name:"Sugo", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"yoparti", name:"YoParti", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"4fun", name:"4Fun", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"ahlan", name:"Ahlan", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"soulchill", name:"Soul Chill", img:"https://via.placeholder.com/60", packs:[2500,5200]},
{id:"soulstar", name:"Soul Star", img:"https://via.placeholder.com/60", packs:[2500,5200]}
];

/* LOAD APPS */
function loadApps(){
let html="";
apps.forEach(app=>{
html+=`
<div class="card" onclick="openApp('${app.id}')">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>`;
});
appsGrid.innerHTML=html;
}
loadApps();

/* NAVIGATION */
function goHome(){
home.style.display="block";
appPage.style.display="none";
ordersPage.style.display="none";
}

function back(){goHome();}

/* OPEN APP */
let currentApp="";
let selectedPack=0;

function openApp(id){
home.style.display="none";
appPage.style.display="block";

let app = apps.find(a=>a.id===id);

currentApp = app.name;
appName.innerText = app.name;

let html="<div class='pack-grid'>";

app.packs.forEach(p=>{
html+=`
<div class="pack-card">
<div>${p} 💎</div>
<div>$${p/500}</div>
<div class="buy-btn" onclick="openBuy(${p})">شراء</div>
</div>`;
});

html+="</div>";
packs.innerHTML=html;
}

/* BUY */
function openBuy(p){
selectedPack=p;
modal.style.display="flex";
}

function confirmBuy(){
let id=userId.value;

if(!id){
alert("اكتب ID");
return;
}

alert("تم الطلب ✅\n"+currentApp+"\n"+selectedPack+" 💎");

modal.style.display="none";
userId.value="";
}

/* ORDERS */
function openOrders(){
home.style.display="none";
ordersPage.style.display="block";

ordersPage.innerHTML="<h3 style='padding:10px'>طلباتي (قريباً)</h3>";
}

</script>

</body>
</html>
