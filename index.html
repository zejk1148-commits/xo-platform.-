<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيقات الدردشة الصوتية</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  direction: rtl;
}

.header {
  background: linear-gradient(to right, #2ecc71, #3498db);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: linear-gradient(to bottom, #ffffff, #1e73be);
  border-radius: 20px;
  text-align: center;
  padding: 10px;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  margin-top: 10px;
}

.app-name {
  margin-top: 10px;
  font-weight: bold;
}

.app-sub {
  font-size: 12px;
  opacity: 0.8;
}
</style>

</head>
<body>

<div class="header">تطبيقات الدردشة الصوتية</div>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/80?text=Xena">
    <div class="app-name">زينا</div>
    <div class="app-sub">Xena</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/80?text=YoParti">
    <div class="app-name">يو بارتي</div>
    <div class="app-sub">YoParti</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/80?text=Sugo">
    <div class="app-name">سوجو</div>
    <div class="app-sub">Sugo</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/80?text=4Fun">
    <div class="app-name">فورفان</div>
    <div class="app-sub">4Fun</div>
  </div>

</div>

</body>
</html>
