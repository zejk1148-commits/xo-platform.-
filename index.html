<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawy Platform</title>

<style>
body{margin:0;font-family:Arial;background:#38bdf8;}
.header{background:#22c55e;padding:12px;display:flex;justify-content:space-between;align-items:center;color:white;}
.menu-btn{font-size:22px;cursor:pointer;}
.balance-box{display:flex;align-items:center;gap:10px;}
.add-btn{background:white;color:black;border-radius:50%;padding:3px 10px;cursor:pointer;}
.sidebar{position:fixed;top:0;right:0;width:260px;height:100%;background:white;transform:translateX(100%);transition:.3s;z-index:1000;padding-top:60px;}
.sidebar.active{transform:translateX(0);}
.sidebar a{display:block;padding:15px;border-bottom:1px solid #eee;cursor:pointer;}
.overlay{position:fixed;width:100%;height:100%;display:none;z-index:999;}
.apps{padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.app{background:white;border-radius:12px;padding:8px;text-align:center;position:relative;font-size:12px;}
.app img{width:40px;height:40px;}
.heart{position:absolute;top:5px;left:5px;color:gray;cursor:pointer;}
.heart.active{color:red;}
.page{display:none;padding:15px;}
.active-page{display:block;}
.bottom-bar{position:fixed;bottom:0;width:100%;background:#22c55e;display:flex;justify-content:space-around;padding:8px 0;}
.icon{text-align:center;font-size:12px;cursor:pointer;}
.package{background:white;margin:10px 0;padding:10px;border-radius:10px;}
.buy-btn{background:#22c55e;border:none;padding:8px;width:100%;margin-top:5px;cursor:pointer;}
input{width:100%;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div>رصيدك: ---</div>
</div>

<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">الرئيسية</a>
  <a onclick="showPage('addbalance')">إضافة رصيد</a>
  <a onclick="showPage('orders')">طلباتي</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<div id="home" class="page active-page">
  <div class="apps">
    <div class="app">
      <img src="https://via.placeholder.com/40">
      <div>Yaahlan</div>
    </div>
  </div>
</div>

<!-- YA AHLAN -->
<div id="yaahlan" class="page">
  <h2>Yaahlan</h2>
  <input id="userId" placeholder="ادخل ID">

  <div class="package">5200 - 10$
    <button class="buy-btn" onclick="buyNow('5200 - 10$')">شراء</button>
  </div>
</div>

<!-- JS -->
<script>
const API_URL = "http://localhost:3000/order";

/* SEND TO SERVER */
function sendToServer(text){
  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:text,
      chat_id:"YOUR_CHAT_ID"
    })
  });
}

/* BUY */
function buyNow(pack){
  let id=document.getElementById("userId").value;
  if(!id){alert("ادخل ID");return;}

  let orderId=Math.floor(Math.random()*100000);

  let msg=`🛒 طلب شراء
رقم: #${orderId}
ID: ${id}
الباقة: ${pack}`;

  sendToServer(msg);
  alert("تم الإرسال ✔️ #" + orderId);
}
</script>

</body>
</html>
