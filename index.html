<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الرئيسية</title>

<style>

/* 🌐 الخلفية */
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  padding-bottom: 80px;
}

/* 🔝 الشريط العلوي (الرصيد + زر الإضافة) */
.top-bar {
  background: #0a8f5a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.balance {
  font-size: 16px;
}

.add-btn {
  background: white;
  color: #0a8f5a;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-weight: bold;
}

/* 🖼️ البانر */
.banner {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 30px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* 📢 شريط خدمة العملاء */
.marquee {
  background: #fff3cd;
  padding: 10px;
  overflow: hidden;
  white-space: nowrap;
}

.marquee span {
  display: inline-block;
  animation: move 10s linear infinite;
}

@keyframes move {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* 📁 المجلدات */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

.card {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  color: white;
  font-weight: bold;
}

/* 📌 الشريط السفلي */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #0d47a1;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom-bar div {
  color: white;
  text-align: center;
  font-size: 14px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- 🔝 الرصيد -->
<div class="top-bar">
  <div class="balance">رصيدك: 0$</div>
  <div class="add-btn" onclick="alert('إضافة رصيد')">+</div>
</div>

<!-- 🖼️ بانر -->
<div class="banner">
  سهل كاش
</div>

<!-- 📢 خدمة العملاء -->
<div class="marquee">
  <span>خدمة العملاء: +63 955 472 1005</span>
</div>

<!-- 📁 الأقسام -->
<div class="grid">

  <div class="card">تطبيقات الشات</div>
  <div class="card">قسم الألعاب</div>
  <div class="card">بطاقات المتاجر</div>
  <div class="card">قسم الأرقام</div>

</div>

<!-- 📌 الشريط السفلي -->
<div class="bottom-bar">
  <div>🏠<br>الرئيسية</div>
  <div>💼<br>محفظتي</div>
  <div>⭐<br>المفضلة</div>
  <div>📦<br>طلباتي</div>
  <div>💳<br>دفعاتي</div>
</div>

</body>
</html>
