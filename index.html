<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>واجهة شحن</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
}

/* الشريط العلوي */
.header {
    background: #1e1e2f;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.balance {
    font-size: 18px;
    background: #4CAF50;
    padding: 8px 15px;
    border-radius: 10px;
}

/* القائمة الجانبية */
.sidebar {
    width: 200px;
    height: 100vh;
    background: #2c2c3e;
    position: fixed;
    top: 0;
    right: 0;
    padding-top: 60px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #444;
}

/* المحتوى */
.content {
    margin-right: 200px;
    padding: 20px;
}

/* أزرار */
.button {
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.charge {
    background: #2196F3;
    color: white;
}

.start {
    background: #FF9800;
    color: white;
}
</style>

</head>

<body>

<!-- الشريط العلوي -->
<div class="header">
    <h2>لوحة التحكم</h2>
    <div class="balance">رصيدك: <span id="balance">100</span> $</div>
</div>

<!-- القائمة الجانبية -->
<div class="sidebar">
    <a href="#">الرئيسية</a>
    <a href="#">شحن رصيد</a>
    <a href="#">طلباتي</a>
    <a href="#">الإعدادات</a>
</div>

<!-- المحتوى -->
<div class="content">
    <h3>اختر عملية</h3>

    <button class="button charge" onclick="charge(10)">شحن 10$</button>
    <button class="button charge" onclick="charge(50)">شحن 50$</button>
    <button class="button charge" onclick="charge(100)">شحن 100$</button>

    <br><br>

    <button class="button start" onclick="startNow()">ابدأ الآن</button>
</div>

<script>
let balance = 100;

function charge(amount) {
    balance += amount;
    document.getElementById("balance").innerText = balance;
    alert("تم الشحن بنجاح!");
}

function startNow() {
    alert("تم بدء العملية 🚀");
}
</script>

</body>
</html>
