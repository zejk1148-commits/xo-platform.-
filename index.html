<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الرئيسية</title>

<style>

/* 🌐 إعدادات عامة */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #e3f2fd, #bbdefb);
  padding: 20px;
  padding-bottom: 80px;
}

/* 🏷️ العنوان */
.title {
  font-size: 24px;
  font-weight: bold;
  color: #0d47a1;
  margin-bottom: 20px;
}

/* 📁 المجلدات */
.folder {
  background: white;
  border-radius: 15px;
  padding: 18px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.folder:hover {
  transform: translateY(-3px);
}

/* 📁 محتوى المجلد */
.folder-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.folder-icon {
  font-size: 22px;
}

.folder-name {
  font-size: 18px;
  color: #0d47a1;
  font-weight: bold;
}

.folder-arrow {
  color: #64b5f6;
  font-size: 18px;
}

/* 📌 الشريط السفلي */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ccc;
}

.bottom-bar button {
  background: none;
  border: none;
  color: #64b5f6;
  font-size: 14px;
  cursor: pointer;
}

.bottom-bar button.active {
  color: #0d47a1;
}

</style>
</head>

<body>

<div class="title">الأقسام</div>

<!-- 📁 الأقسام -->
<div class="folder" onclick="alert('قسم الألعاب')">
  <div class="folder-left">
    <span class="folder-icon">🎮</span>
    <span class="folder-name">الألعاب</span>
  </div>
  <span class="folder-arrow">➡️</span>
</div>

<div class="folder" onclick="alert('قسم التطبيقات')">
  <div class="folder-left">
    <span class="folder-icon">📱</span>
    <span class="folder-name">التطبيقات</span>
  </div>
  <span class="folder-arrow">➡️</span>
</div>

<div class="folder" onclick="alert('قسم البطاقات')">
  <div class="folder-left">
    <span class="folder-icon">💳</span>
    <span class="folder-name">البطاقات</span>
  </div>
  <span class="folder-arrow">➡️</span>
</div>

<div class="folder" onclick="alert('قسم العروض')">
  <div class="folder-left">
    <span class="folder-icon">🔥</span>
    <span class="folder-name">العروض</span>
  </div>
  <span class="folder-arrow">➡️</span>
</div>

<!-- 📌 الشريط السفلي -->
<div class="bottom-bar">
  <button class="active">🏠 الرئيسية</button>
  <button>⭐ المفضلة</button>
  <button>⚙️ الإعدادات</button>
</div>

</body>
</html>
