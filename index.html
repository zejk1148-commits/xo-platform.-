<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر التطبيقات</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:#1e1e2f;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:999;
}
.sidebar.open{
  transform:translateX(0);
}

.sidebar a{
  display:block;
  padding:12px;
  margin:8px 0;
  background:#2c2c44;
  color:white;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.card img{
  width:65px;
  height:65px;
  border-radius:14px;
}

/* PACK */
.pack{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

/* BUTTON */
button{
  background:#2ecc71;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="openFav()">❤️ المفضلة</a>
</div>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- HOME -->
<div id="home">
<div class="header">
<div onclick="toggle()">☰</div>
<div id="balanceText">الرصيد: $120</div>
</div>

<div class="grid" id="appsGrid"></div>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div id="title"></div>
</div>

<div id="packs"></div>
</div>

<!-- BALANCE -->
<div id="balancePage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>إضافة رصيد</div>
</div>
</div>

<!-- CHARGE -->
<div id="chargePage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>شحن الرصيد</div>
</div>

<div style="padding:10px">
<div class="card">💳 تحويل بنكي</div>
<div class="card">📱 شام كاش</div>
</div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>طلباتي</div>
</div>

<div style="padding:10px">
<p>لا يوجد طلبات 📦</p>
</div>
</div>

<!-- FAV -->
<div id="favPage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>المفضلة</div>
</div>

<div style="padding:10px">
<p>لا يوجد مفضلة ❤️</p>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>إدخال ID</h3>
    <input id="userId">
    <br><br>
    <button onclick="confirmBuy()">تأكيد</button>
  </div>
</div>

<script>

/* SIDEBAR */
function toggle(){
sidebar.classList.toggle("open");
overlay.style.display = sidebar.classList.contains("open") ? "block" : "none";
}

overlay.onclick = function(){
sidebar.classList.remove("open");
overlay.style.display="none";
}

/* APPS */
const apps = [
{name:"YoParty",img:"https://i.ibb.co/8n3DfwWT/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"Sugo",img:"https://i.ibb.co/qVF1fnS/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"Zina Live",img:"https://i.ibb.co/gM9GsQbt/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"يا أهلا",img:"https://i.ibb.co/G307spDQ/image.png",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"Soul Star",img:"https://i.ibb.co/VW6061sh/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"Soltchen",img:"https://i.ibb.co/TMqz7RhY/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]},

{name:"4fun",img:"https://i.ibb.co/7tJjGrsn/image.jpg",
packs:[{amount:2500,price:5},{amount:5200,price:10}]}
];

function loadApps(){
let html="";
apps.forEach((app,i)=>{
html+=`
<div class="card" onclick="openApp(${i})">
<img src="${app.img}">
<div>${app.name}</div>
</div>`;
});
appsGrid.innerHTML=html;
}
loadApps();

/* OPEN APP */
let selectedPrice=0;

function openApp(i){
home.style.display="none";
appPage.style.display="block";

let app=apps[i];
title.innerText=app.name;

let html="";
app.packs.forEach(p=>{
html+=`
<div class="pack">
<div>${p.amount} 💎</div>
<div>$${p.price}</div>
<button onclick="buy(${p.price})">شراء</button>
</div>`;
});
packs.innerHTML=html;
}

/* BUY */
function buy(price){
selectedPrice=price;
modal.style.display="flex";
}

function confirmBuy(){
let id=document.getElementById("userId").value;
if(!id){alert("اكتب ID");return;}

alert("تم الطلب ✅");
modal.style.display="none";
userId.value="";
}

/* PAGES */
function goHome(){
home.style.display="block";
appPage.style.display="none";
balancePage.style.display="none";
chargePage.style.display="none";
ordersPage.style.display="none";
favPage.style.display="none";
}

function openBalance(){
home.style.display="none";
balancePage.style.display="block";
}

function openCharge(){
home.style.display="none";
chargePage.style.display="block";
}

function openOrders(){
home.style.display="none";
ordersPage.style.display="block";
}

function openFav(){
home.style.display="none";
favPage.style.display="block";
}

</script>

</body>
  </html>
