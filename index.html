<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>متجر التطبيقات</title>

<style>
html, body {
  margin:0 !important;
  padding:0 !important;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

body{
  position: relative;
}

.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  padding-top:22px;
  margin-top:-10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.header div:first-child{
  z-index:999999;
  position:relative;
  font-size:20px;
}

.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:190px;
  height:100%;
  background:#1e1e2f;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
}
.sidebar.open{transform:translateX(0);}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  background:#2c2c44;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:9998;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(80px, 1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:60px;
  height:60px;
  border-radius:14px;
  object-fit:cover;
}

.card-name{
  font-size:13px;
  margin-top:5px;
  font-weight:bold;
}

.heart{
  position:absolute;
  top:5px;
  left:5px;
  font-size:18px;
  cursor:pointer;
}

.pack-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:85%;
  max-width:260px;
  position:relative;
}

.close-btn{
  position:absolute;
  top:8px;
  left:10px;
  font-size:18px;
  cursor:pointer;
}

.modal input{
  width:90%;
  padding:8px;
  margin:10px auto;
  display:block;
}

.modal button{
  display:block;
  margin:10px auto 0;
  background:#2ecc71;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h3 style="text-align:center;">القائمة</h3>
  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="openFav()">❤️ المفضلة</a>
</div>

<div class="overlay" id="overlay"></div>

<div id="home">
<div class="header">
<div onclick="toggleSidebar()">☰</div>

<div style="display:flex; gap:10px; align-items:center;">
  <div id="appTitle" style="display:none;"></div>
  <div id="balanceText">الرصيد: $120</div>
</div>
</div>

<div class="grid" id="appsGrid"></div>
</div>

<div id="appPage" style="display:none">
<div class="header">
<div onclick="back()">رجوع</div>
<div id="appName"></div>
</div>
<div id="packs"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<div class="close-btn" onclick="closeModal()">✖</div>
<h3>إدخال ID</h3>
<input id="userId">
<button onclick="confirmBuy()">تأكيد</button>
</div>
</div>

<script>

let balance = parseFloat(localStorage.getItem("balance")) || 120;

function updateBalance(){
balanceText.innerText = "الرصيد: $" + balance;
}
updateBalance();

const apps = [
{id:"yaahlan", name:"يا أهلا", img:"https://i.ibb.co/G307spDQ/image.png",
packs:[
{amount:2500,price:5},
{amount:5200,price:10},
{amount:10600,price:20},
{amount:27000,price:50},
{amount:40000,price:75},
{amount:52500,price:100}
]},
{id:"4fun", name:"4fun", img:"https://i.ibb.co/7tJjGrsn/image.jpg", packs:[2500,5200,10600,27000]}
];

let currentApp="";
let selectedPack=0;

function openApp(id){
home.style.display="none";
appPage.style.display="block";

let app=apps.find(a=>a.id===id);
currentApp=app.name;
appName.innerText=app.name;

let html="<div class='pack-grid'>";

app.packs.forEach(p=>{
let amount = typeof p==="object"?p.amount:p;
let price = typeof p==="object"?p.price:(p/500);

html+=`
<div class="pack-card">
<div>${amount} 💎</div>
<div>$${price}</div>
<div class="buy-btn" onclick="openBuy(${amount})">شراء</div>
</div>`;
});

html+="</div>";
packs.innerHTML=html;
}

function openBuy(p){
selectedPack=p;
modal.style.display="flex";
}

function confirmBuy(){
let app=apps.find(a=>a.name===currentApp);
let pack=app.packs.find(p=>(typeof p==="object"?p.amount:p)==selectedPack);
let price=typeof pack==="object"?pack.price:selectedPack/500;

alert("تم الشراء بسعر $"+price);
}

function closeModal(){
modal.style.display="none";
}

function goHome(){
home.style.display="block";
appPage.style.display="none";
}

</script>

</body>
</html>
