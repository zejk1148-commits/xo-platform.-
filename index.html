<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sahl Cash UI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  background: #f5f5f5;
}

/* الشريط العلوي */
.topbar {
  background: #2ecc71;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-btn {
  font-size: 20px;
  cursor: pointer;
}

.balance {
  font-size: 18px;
}

.add-btn {
  background: white;
  color: #2ecc71;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  margin-right: 10px;
}

/* الشريط الجانبي */
.sidebar {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #333;
  color: white;
  transition: 0.3s;
  padding-top: 60px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #444;
  cursor: pointer;
}

.sidebar a:hover {
  background: #444;
}

/* المحتوى */
.content {
  padding: 20px;
}

/* الصفحات */
.page { display: none; }
.active { display: block; }

/* كروت */
.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
}

/* فورم */
.form-box {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
  width: 100%;
  background: #2ecc71;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- الشريط العلوي -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>

  <div class="balance">
    الرصيد: 100$
    <button class="add-btn" onclick="showPage('addBalance')">+</button>
  </div>
</div>

<!-- الشريط الجانبي -->
<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">🏠 الرئيسية</a>
  <a onclick="showPage('addBalance')">➕ إضافة الرصيد</a>
  <a onclick="showPage('charge')">📱 شحن</a>
  <a onclick="showPage('wallet')">👛 محفظتي</a>
  <a onclick="showPage('fav')">⭐ المفضلة</a>
</div>

<!-- المحتوى -->
<div class="content">

<!-- الرئيسية -->
<div id="home" class="page active">
  <h2>أهلاً بك 👋</h2>
</div>

<!-- إضافة الرصيد -->
<div id="addBalance" class="page">
  <h2>إضافة الرصيد 💰</h2>

  <div class="card" onclick="selectMethod('ziraat')">
    🏦 بنك زراعات
  </div>

  <div class="card" onclick="selectMethod('sham')">
    💳 شام كاش
  </div>
