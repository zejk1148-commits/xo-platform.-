<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

/* APP CARD */
.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  transition:0.2s;
}

.card:active{
  transform:scale(0.95);
}

.card img{
  width:55px;
  height:55px;
  border-radius:12px;
  margin-bottom:5px;
}

.card-name{
  font-size:13px;
  font-weight:bold;
  color:#333;
}
</style>
</head>

<body>

<div class="header">
  <div>الرصيد: $0</div>
</div>

<div class="grid" id="appsGrid"></div>

<script>

/* التطبيقات */
const apps = [
{
id:"yaahlan",
name:"يا أهلا",
img:"https://i.ibb.co/9mnxtvrG/image.png"
},
{
id:"xena",
name:"Xena",
img:"https://via.placeholder.com/60"
},
{
id:"yoparti",
name:"YoParti",
img:"https://via.placeholder.com/60"
},
{
id:"sugo",
name:"Sugo",
img:"https://via.placeholder.com/60"
},
{
id:"4fun",
name:"4Fun",
img:"https://via.placeholder.com/60"
},
{
id:"ahlan",
name:"Ahlan",
img:"https://via.placeholder.com/60"
},
{
id:"soulchill",
name:"Soul Chill",
img:"https://via.placeholder.com/60"
},
{
id:"soulstar",
name:"Soul Star",
img:"https://via.placeholder.com/60"
}
];

/* تحميل التطبيقات */
function loadApps(){
let html="";

apps.forEach(app=>{
html+=`
<div class="card">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>
`;
});

document.getElementById("appsGrid").innerHTML=html;
}

loadApps();

</script>

</body>
</html>
