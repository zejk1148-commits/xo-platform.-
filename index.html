<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store</title>

<style>
body{margin:0;font-family:Arial;background:#38bdf8}

/* HEADER */
.header{
background:#22c55e;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.menu{font-size:22px;cursor:pointer}
.balance{font-weight:bold}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;right:0;
width:260px;
height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
z-index:1000;
padding-top:20px;
}

.profile{
text-align:center;
padding:20px;
border-bottom:1px solid #eee;
}

.profile img{
width:70px;height:70px;
border-radius:50%;
background:#ddd;
}

.sidebar a{
display:block;
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
z-index:999;
}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.app{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
position:relative;
cursor:pointer;
}

.heart{
position:absolute;
top:5px;left:5px;
color:gray;
cursor:pointer;
}
.heart.active{color:red}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;left:0;right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

/* PACKAGES */
.package{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
text-align:center;
}

button{
background:#22c55e;
border:none;
color:white;
padding:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="menu" onclick="openMenu()">☰</div>
<div class="balance" id="balanceText">0$</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="profile">
<img>
<div>User</div>
</div>

<a onclick="show('home')">الرئيسية</a>
<a onclick="show('favorites')">المفضلة</a>
<a onclick="show('wallet')">المحفظة</a>
<a onclick="show('redeem')">شحن</a>
</div>

<div class="overlay" onclick="closeMenu()" id="overlay"></div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة</h3>
<div id="walletList"></div>
</div>

<!-- YA AHLAN -->
<div id="yaahlan" class="page">
<h3>Yaahlan</h3>
<input id="userId" placeholder="ID المستخدم">

<div class="package" onclick="buy(10,5200)">10$ - 5200 💎</div>
<div class="package" onclick="buy(20,10600)">20$ - 10600 💎</div>
<div class="package" onclick="buy(50,27000)">50$ - 27000 💎</div>
<div class="package" onclick="buy(75,40000)">75$ - 40000 💎</div>
<div class="package" onclick="buy(100,52000)">100$ - 52000 💎</div>

</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن رصيد 💳</h3>
<input id="codeInput" placeholder="أدخل الكود">
<button onclick="redeemCode()">تفعيل</button>
</div>

<!-- BOTTOM -->
<div class="bottom">
<div onclick="show('home')">🏠</div>
<div onclick="show('favorites')">❤️</div>
<div onclick="show('wallet')">💼</div>
<div onclick="show('redeem')">💳</div>
</div>

<script>

/* DATA */
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || [];
let wallet = JSON.parse(localStorage.getItem("wallet")) || [];

/* CODES */
const codes = {
"XO5":5,
"XO10":10,
"XO20":20,
"XO50":50
};

updateBalance();
renderApps();
renderFav();
renderWallet();

/* APPS */
const apps = ["yaahlan","xena","yoparti","sugo","4fun","ahlan","soulchill","soulstar"];

function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";
apps.forEach(a=>{
box.innerHTML+=`
<div class="app" onclick="openApp('${a}')">
<div class="heart ${favorites.includes(a)?'active':''}" onclick="toggleFav(event,'${a}')">❤</div>
<div>${a}</div>
</div>`;
});
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* MENU */
function openMenu(){
document.getElementById("sidebar").style.transform="translateX(0)";
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("sidebar").style.transform="translateX(100%)";
document.getElementById("overlay").style.display="none";
}

/* FAVORITES */
function toggleFav(e,id){
e.stopPropagation();
if(favorites.includes(id)){
favorites=favorites.filter(x=>x!==id);
}else{
favorites.push(id);
}
localStorage.setItem("favorites",JSON.stringify(favorites));
renderApps();
renderFav();
}

function renderFav(){
let box=document.getElementById("favList");
box.innerHTML=favorites.length?favorites.join("<br>"):"فارغ";
}

/* WALLET */
function addWallet(t){
wallet.push(t);
localStorage.setItem("wallet",JSON.stringify(wallet));
renderWallet();
}

function renderWallet(){
document.getElementById("walletList").innerHTML =
wallet.length?wallet.join("<br>"):"فارغ";
}

/* BUY */
function buy(price,diamond){
let id=document.getElementById("userId").value;

if(!id) return alert("ادخل ID");
if(balance<price) return alert("رصيد غير كافي");

balance-=price;
updateBalance();

addWallet(`شراء ${price}$ - ${diamond} 💎 - ID:${id}`);

/* TELEGRAM */
fetch("https://api.telegram.org/botYOUR_TOKEN/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"YOUR_CHAT_ID",
text:`طلب جديد\nID:${id}\nالسعر:${price}$\nالماس:${diamond}`
})
});

alert("تم الطلب");
}

/* REDEEM */
function redeemCode(){
let code=document.getElementById("codeInput").value.trim();

if(!code) return alert("اكتب الكود");
if(usedCodes.includes(code)) return alert("الكود مستخدم مسبقاً");

if(codes[code]){
balance+=codes[code];
usedCodes.push(code);

localStorage.setItem("balance",balance);
localStorage.setItem("usedCodes",JSON.stringify(usedCodes));

updateBalance();
alert("تم الشحن +" + codes[code] + "$");
}
}

function updateBalance(){
document.getElementById("balanceText").innerText = balance + "$";
}
</script>

</body>
</html>
