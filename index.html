<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO STORE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6}

/* TOP BAR */
.topbar{
background:#16a34a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
font-weight:bold;
}

.plus{
cursor:pointer;
background:white;
color:#16a34a;
padding:2px 10px;
border-radius:50%;
font-size:18px;
}

/* SIDEBAR */
.sidebar{
position:fixed;
right:0;top:0;
width:260px;height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
z-index:999;
padding:15px;
}
.sidebar.open{transform:translateX(0)}

.overlay{
position:fixed;
inset:0;
display:none;
z-index:998;
}

.menu-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.app{
background:white;
padding:10px;
border-radius:10px;
position:relative;
text-align:center;
}

.heart{
position:absolute;
top:5px;left:5px;
color:#aaa;
cursor:pointer;
}
.heart.active{color:red}

/* BOX */
.box{
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* INPUT */
input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#16a34a;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<div>☰</div>

<div>
الرصيد: <span id="balanceTop">0</span>$
<span class="plus" onclick="openPage('redeem')">+</span>
</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menu-item" onclick="openPage('home')">🏠 الرئيسية</div>
<div class="menu-item" onclick="openPage('redeem')">💳 إضافة الرصيد</div>
<div class="menu-item" onclick="openPage('wallet')">💼 المحفظة</div>
<div class="menu-item" onclick="openPage('favorites')">❤️ المفضلة</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h3>التطبيقات</h3>
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة</h3>
<p>الوارد: <span id="income">0</span>$</p>
<p>المصروف: <span id="spent">0</span>$</p>
</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>إضافة الرصيد 💳</h3>

<button onclick="showMethod('cash')">شام كاش</button>
<button onclick="showMethod('bank')">زرعات بنك</button>

<div id="methodBox"></div>
</div>

<script>

/* BOT */
const BOT_TOKEN = "PUT_BOT_TOKEN";
const CHAT_ID = "PUT_CHAT_ID";

/* DATA */
let income = 0;
let spent = 0;
let favorites = [];

/* APPS */
const apps = [
{name:"يا أهلاً",img:"https://via.placeholder.com/100"},
{name:"Game",img:"https://via.placeholder.com/100"},
{name:"VIP",img:"https://via.placeholder.com/100"}
];

/* RENDER APPS */
function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";

apps.forEach(a=>{
box.innerHTML+=`
<div class="app">
<div class="heart" onclick="toggleFav('${a.name}',this)">❤</div>
<img src="${a.img}">
<div>${a.name}</div>
</div>`;
});
}

/* FAVORITE */
function toggleFav(name,el){
el.classList.toggle("active");

if(favorites.includes(name)){
favorites=favorites.filter(f=>f!==name);
}else{
favorites.push(name);
}

renderFav();
}

/* RENDER FAV */
function renderFav(){
let box=document.getElementById("favList");
box.innerHTML="";

favorites.forEach(f=>{
box.innerHTML+=`<div class="box">❤️ ${f}</div>`;
});
}

/* PAGE */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

closeMenu();
}

/* SIDEBAR */
function toggleMenu(){
document.getElementById("sidebar").classList.add("open");
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("open");
document.getElementById("overlay").style.display="none";
}

/* METHOD */
function showMethod(type){

if(type==="cash"){
document.getElementById("methodBox").innerHTML=`
<div class="box">
<h4>شام كاش</h4>
<p>اسم الحساب: Ahmed</p>
<p>الآيبان: 123456789</p>

<input id="name" placeholder="اسمك">
<input id="order" placeholder="رقم العملية">
<input id="amount" placeholder="المبلغ">

<button onclick="send('شام كاش')">شحن</button>
</div>`;
}

if(type==="bank"){
document.getElementById("methodBox").innerHTML=`
<div class="box">
<h4>زرعات بنك</h4>
<p>اسم الحساب: Ali</p>
<p>الآيبان: 987654321</p>

<input id="name" placeholder="اسمك">
<input id="order" placeholder="رقم العملية">
<input id="amount" placeholder="المبلغ">

<button onclick="send('زرعات بنك')">شحن</button>
</div>`;
}
}

/* SEND TO TELEGRAM */
function send(type){

let name=document.getElementById("name").value;
let order=document.getElementById("order").value;
let amount=document.getElementById("amount").value;

let text=`
💳 شحن جديد
🏦 الطريقة: ${type}
👤 الاسم: ${name}
🔢 العملية: ${order}
💰 المبلغ: ${amount}
`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`
});

alert("تم إرسال الطلب ✔️");
}

/* INIT */
renderApps();
renderFav();

</script>

</body>
</html>
