<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.page{display:none;}
.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

/* شكل التطبيق */
.card{
  background:linear-gradient(to left,#3498db,#2ecc71);
  color:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

/* أيقونة التطبيق */
.icon{
  font-size:35px;
  margin-bottom:8px;
  display:block;
}

.pack{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

.pack-item{
  background:#f0f0f0;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div class="header">
  <div>☰</div>
  <div>التطبيقات</div>
</div>

<div class="grid">

  <div class="card" onclick="openApp('xena')">
    <span class="icon">🎮</span>
    زينا - Xena
  </div>

  <div class="card" onclick="openApp('yoparti')">
    <span class="icon">💬</span>
    يو بارتي - YoParti
  </div>

  <div class="card" onclick="openApp('sugo')">
    <span class="icon">🎤</span>
    سوجو - Sugo
  </div>

  <div class="card" onclick="openApp('4fun')">
    <span class="icon">🎉</span>
    فورفان - 4Fun
  </div>

  <div class="card" onclick="openApp('ahlan')">
    <span class="icon">👋</span>
    أهلن شات - Ahlan Chat
  </div>

  <div class="card" onclick="openApp('soulchill')">
    <span class="icon">🌙</span>
    سول شيل - Soul Chill
  </div>

  <div class="card" onclick="openApp('yaahlan')">
    <span class="icon">💎</span>
    يا أهلا - Yaahlan
  </div>

  <div class="card" onclick="openApp('soulstar')">
    <span class="icon">⭐</span>
    سول ستار - Soul Star
  </div>

</div>

</div>

<!-- APP PAGE -->
<div id="appPage" class="page">

<div class="header">
  <div onclick="back()">رجوع</div>
  <div id="appName">تطبيق</div>
</div>

<div id="packs"></div>

</div>

<script>

function show(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function back(){
  show("home");
}

function openApp(app){

  show("appPage");

  let name = "";
  let packs = "";

  if(app === "yaahlan"){
    name = "يا أهلا - Yaahlan";

    packs = `
      <div class="pack">
        <div class="pack-item">5200 ماس - 10$</div>
        <div class="pack-item">10600 ماس - 20$</div>
        <div class="pack-item">27000 ماس - 50$</div>
        <div class="pack-item">40000 ماس - 75$</div>
        <div class="pack-item">52500 ماس - 100$</div>
      </div>
    `;
  }

  else{
    name = app;
    packs = `
      <div class="pack">
        <div class="pack-item">لا توجد باقات حالياً</div>
      </div>
    `;
  }

  document.getElementById("appName").innerText = name;
  document.getElementById("packs").innerHTML = packs;
}

</script>

</body>
</html>
