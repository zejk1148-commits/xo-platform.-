<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
direction:rtl;
}

/* TOP BAR */
.topbar{
background:#dff7e6;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
position:sticky;
top:0;
z-index:999;
}

.menu{font-size:24px;cursor:pointer}
.balance{
display:flex;
align-items:center;
gap:10px;
}

.plus{
background:#16a34a;
color:white;
padding:4px 10px;
border-radius:50%;
cursor:pointer;
}

/* NEWS BAR */
.news{
background:#ffffff;
padding:6px;
overflow:hidden;
white-space:nowrap;
border-bottom:1px solid #eee;
font-size:14px;
}

.news span{
display:inline-block;
padding-left:100%;
animation:move 10s linear infinite;
}

@keyframes move{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* APPS GRID */
.apps{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.app{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
position:relative;
}

.app img{
width:50px;
height:50px;
border-radius:10px;
}

.app .name{
font-size:12px;
margin-top:5px;
}

.heart{
position:absolute;
top:5px;
left:5px;
font-size:18px;
color:#bbb;
cursor:pointer;
}

.heart.active{
color:red;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:-280px;
width:260px;
height:100%;
background:white;
transition:0.3s;
z-index:1000;
padding:10px;
}

.sidebar.open{
right:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:999;
}

/* PROFILE */
.profile{
text-align:center;
margin-top:10px;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
background:#ddd;
}

.divider{
height:1px;
background:#eee;
margin:10px 0;
}

/* MENU ITEMS */
.item{
padding:10px;
cursor:pointer;
}

/* PAGE */
.page{
display:none;
padding:10px;
}

.active{display:block}

/* RECHARGE */
.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:50px;
height:50px;
}

/* FORM */
input,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#16a34a;
color:white;
border:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">

<div class="profile">
<img id="userImg">
<div id="userName">المستخدم</div>
<div>💰 <span id="userBalance">0</span>$</div>
</div>

<div class="divider"></div>

<div class="item" onclick="showPage('home')">🏠 الرئيسية</div>
<div class="item" onclick="showPage('recharge')">💳 شحن</div>
<div class="item" onclick="showPage('wallet')">💼 محفظتي</div>
<div class="item" onclick="showPage('fav')">❤️ المفضلة</div>

</div>

<!-- TOP -->
<div class="topbar">
<div class="menu" onclick="toggleSidebar()">☰</div>

<div class="balance">
💰 <span id="balance">0</span>$
<div class="plus" onclick="showPage('recharge')">+</div>
</div>
</div>

<!-- NEWS -->
<div class="news">
<span>📞 خدمة العملاء +63 955 472 1005 — مرحباً بك في التطبيق — أفضل تجربة مستخدم 🚀</span>
</div>

<!-- HOME -->
<div class="page active" id="home">

<div class="apps">

<!-- apps -->
<script>
const apps=[
"زينا - Xena",
"يو بارتي - YoParti",
"سوجو - Sugo",
"فورفان - 4Fun",
"اهلن شات - Ahlan Chat",
"سول شيل - Soul Chill",
"يا اهلن - Yaahlan",
"سول ستار - Soul Star"
];

document.write(apps.map(a=>`
<div class="app">
<div class="heart" onclick="toggleHeart(this)">❤</div>
<img src="https://via.placeholder.com/50">
<div class="name">${a}</div>
</div>
`).join(''));
</script>

</div>
</div>

<!-- RECHARGE -->
<div class="page" id="recharge">

<h3>شحن الرصيد</h3>

<div class="cards">

<div class="card" onclick="selectMethod('cash')">
<img src="https://via.placeholder.com/50">
<div>شام كاش</div>
</div>

<div class="card" onclick="selectMethod('bank')">
<img src="https://via.placeholder.com/50">
<div>زرعات بنك</div>
</div>

</div>

<div id="formArea"></div>

</div>

<!-- WALLET -->
<div class="page" id="wallet">
<h3>المحفظة</h3>
</div>

<!-- FAVORITE -->
<div class="page" id="fav">
<h3>المفضلة</h3>
</div>

<script>

const BOT_TOKEN="PUT_BOT_TOKEN";
const CHAT_ID="PUT_CHAT_ID";

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
document.getElementById("overlay").style.display =
document.getElementById("sidebar").classList.contains("open") ? "block":"none";
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
toggleSidebar();
}

function toggleHeart(el){
el.classList.toggle("active");
}

function selectMethod(type){

document.getElementById("formArea").innerHTML=`
<h4>${type==="cash"?"شام كاش":"زرعات بنك"}</h4>

<input id="name" placeholder="اسم الشخص">
<input id="order" placeholder="رقم العملية">
<input id="amount" placeholder="المبلغ">

<button onclick="send('${type}')">شحن</button>
`;
}

function send(type){

let name=document.getElementById("name").value;
let order=document.getElementById("order").value;
let amount=document.getElementById("amount").value;

let text=`
💳 طلب شحن جديد
🏦 الطريقة: ${type}
👤 الاسم: ${name}
🔢 العملية: ${order}
💰 المبلغ: ${amount}
`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`
});

alert("تم إرسال الطلب ✔️");
}

</script>

</body>
</html>
