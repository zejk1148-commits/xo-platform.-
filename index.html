<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر التطبيقات</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f5f5f5}

.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:190px;
  height:100%;
  background:#1e1e2f;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:999;
}
.sidebar.open{transform:translateX(0);}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  background:#2c2c44;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:55px;
  height:55px;
  border-radius:12px;
}

.card-name{
  font-size:13px;
  margin-top:5px;
  font-weight:bold;
}

/* ❤️ القلب */
.heart{
  position:absolute;
  top:5px;
  left:5px;
  font-size:18px;
  cursor:pointer;
}

.pack-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}

.modal input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3 style="text-align:center;">القائمة</h3>

  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="openFav()">❤️ المفضلة</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- HOME -->
<div id="home">
<div class="header">
<div onclick="toggleSidebar()">☰</div>
<div>الرصيد: $120</div>
</div>

<div class="grid" id="appsGrid"></div>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none">
<div class="header">
<div onclick="back()">رجوع</div>
<div id="appName"></div>
</div>
<div id="packs"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none"></div>

<!-- ADD BALANCE -->
<div id="balancePage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>إضافة رصيد</div>
  </div>
  <h3>قريباً 💰</h3>
</div>

<!-- CHARGE -->
<div id="chargePage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>شحن</div>
  </div>

  <input id="codeInput" placeholder="ادخل كود الشحن">
  <button onclick="alert('تم الشحن (تجريبي)')">تأكيد</button>
</div>

<!-- FAVORITES -->
<div id="favPage" style="display:none; padding:15px;"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>إدخال ID</h3>
<input id="userId">
<button onclick="confirmBuy()">تأكيد</button>
</div>
</div>

<script>

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("open");
  overlay.style.display = sidebar.classList.contains("open") ? "block" : "none";
}
overlay.onclick=()=>{
  sidebar.classList.remove("open");
  overlay.style.display="none";
}

/* APPS */
const apps = [
{id:"yaahlan", name:"يا أهلا", img:"https://i.ibb.co/G307spDQ/image.png", packs:[2500,5200,10600,27000]},
{id:"xena", name:"Xena", img:"https://cdn-icons-png.flaticon.com/512/906/906343.png", packs:[2500,5200]},
{id:"sugo", name:"Sugo", img:"https://cdn-icons-png.flaticon.com/512/1048/1048953.png", packs:[2500,5200]},
{id:"yoparti", name:"YoParti", img:"https://cdn-icons-png.flaticon.com/512/747/747376.png", packs:[2500,5200]},
{id:"4fun", name:"4fun", img:"https://files.catbox.moe/3lq9o0.png", packs:[2500,5200,10600,27000]},
{id:"ahlan", name:"Ahlan", img:"https://cdn-icons-png.flaticon.com/512/4712/4712035.png", packs:[2500,5200]},
{id:"soulchill", name:"Soul Chill", img:"https://cdn-icons-png.flaticon.com/512/4140/4140048.png", packs:[2500,5200]},
{id:"soulstar", name:"Soul Star", img:"https://cdn-icons-png.flaticon.com/512/616/616489.png", packs:[2500,5200]}
];

/* ❤️ المفضلة */
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function toggleFav(id){
if(favorites.includes(id)){
favorites = favorites.filter(x=>x!==id);
}else{
favorites.push(id);
}
localStorage.setItem("fav", JSON.stringify(favorites));
loadApps();
}

/* LOAD APPS */
function loadApps(){
let html="";
apps.forEach(app=>{
let heart = favorites.includes(app.id) ? "❤️" : "🤍";

html+=`
<div class="card">
<div class="heart" onclick="toggleFav('${app.id}')">${heart}</div>
<div onclick="openApp('${app.id}')">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>
</div>`;
});
appsGrid.innerHTML=html;
}
loadApps();

/* NAVIGATION */
function hideAll(){
home.style.display="none";
appPage.style.display="none";
ordersPage.style.display="none";
balancePage.style.display="none";
chargePage.style.display="none";
favPage.style.display="none";
}

function goHome(){hideAll();home.style.display="block";}
function openBalance(){hideAll();balancePage.style.display="block";}
function openCharge(){hideAll();chargePage.style.display="block";}
function back(){goHome();}

/* OPEN APP */
let currentApp="";
let selectedPack=0;

function openApp(id){
hideAll();
appPage.style.display="block";

let app = apps.find(a=>a.id===id);

currentApp = app.name;
appName.innerText = app.name;

let html="<div class='pack-grid'>";
app.packs.forEach(p=>{
html+=`
<div class="pack-card">
<div>${p} 💎</div>
<div>$${p/500}</div>
<div class="buy-btn" onclick="openBuy(${p})">شراء</div>
</div>`;
});
html+="</div>";

packs.innerHTML=html;
}

/* BUY */
function openBuy(p){
selectedPack=p;
modal.style.display="flex";
}

function confirmBuy(){
let id=userId.value;

if(!id){alert("اكتب ID");return;}

alert("تم الطلب ✅");
modal.style.display="none";
userId.value="";
}

/* FAVORITES PAGE */
function openFav(){
hideAll();
favPage.style.display="block";

let favApps = apps.filter(a=>favorites.includes(a.id));

let html="<div class='header'><div onclick='goHome()'>رجوع</div><div>المفضلة</div></div>";

if(favApps.length===0){
html+="<h3 style='padding:10px'>لا يوجد مفضلة ❤️</h3>";
}else{
html+="<div class='grid'>";
favApps.forEach(app=>{
html+=`
<div class="card" onclick="openApp('${app.id}')">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>`;
});
html+="</div>";
}

favPage.innerHTML=html;
}

/* ORDERS */
function openOrders(){
hideAll();
ordersPage.style.display="block";
ordersPage.innerHTML="<h3 style='padding:10px'>طلباتي (قريباً)</h3>";
}

</script>

</body>
  </html>
