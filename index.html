<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store</title>

<style>
body{margin:0;font-family:Arial;background:#38bdf8}

/* HEADER */
.header{
background:#22c55e;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.menu{font-size:22px;cursor:pointer}

.balance{display:flex;gap:10px;align-items:center}
.recharge{background:white;color:black;border-radius:50%;padding:3px 10px;cursor:pointer}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:0;
width:250px;
height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
z-index:1000;
padding-top:60px;
}

.sidebar a{
display:block;
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
z-index:999;
}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.app{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
position:relative;
cursor:pointer;
}

.app img{width:40px;height:40px}

.heart{
position:absolute;
top:5px;
left:5px;
cursor:pointer;
color:gray;
}

.heart.active{color:red}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* PACKAGES */
.package{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
color:white;
padding:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="menu" onclick="openMenu()">☰</div>

<div class="balance">
<div id="balanceText">رصيدك: 0$</div>
<div class="recharge" onclick="showPage('redeem')">💳</div>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a onclick="showPage('home')">الرئيسية</a>
<a onclick="showPage('favorites')">المفضلة</a>
<a onclick="showPage('wallet')">المحفظة</a>
<a onclick="showPage('redeem')">شحن</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps">

<div class="app" onclick="showPage('yaahlan')">
<div class="heart" data-id="yaahlan" onclick="toggleFav(event,this,'yaahlan')">❤</div>
<img src="https://via.placeholder.com/40">
<div>Yaahlan</div>
</div>

</div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة</h3>
</div>

<!-- YA AHLAN -->
<div id="yaahlan" class="page">
<h3>Yaahlan</h3>

<input id="userId" placeholder="ID المستخدم">

<div class="package">
10$ <button onclick="buy(10)">شراء</button>
</div>

<div class="package">
20$ <button onclick="buy(20)">شراء</button>
</div>

<div class="package">
50$ <button onclick="buy(50)">شراء</button>
</div>

</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن رصيد 💳</h3>

<input id="codeInput" placeholder="أدخل الكود">
<button onclick="redeem()">تفعيل</button>
</div>

<script>

/* بيانات */
let balance = parseInt(localStorage.getItem("balance")) || 0;
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || [];

/* أكواد شحن */
const codes = {
"XO10":10,
"XO20":20,
"XO50":50,
"XO100":100
};

updateBalance();

/* ====== UI ====== */

function updateBalance(){
document.getElementById("balanceText").innerText = "رصيدك: " + balance + "$";
localStorage.setItem("balance",balance);
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openMenu(){
document.getElementById("sidebar").style.transform="translateX(0)";
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").style.transform="translateX(100%)";
document.getElementById("overlay").style.display="none";
}

/* ====== FAVORITES ====== */

function toggleFav(e,el,id){
e.stopPropagation();

if(favorites.includes(id)){
favorites = favorites.filter(x=>x!==id);
el.classList.remove("active");
}else{
favorites.push(id);
el.classList.add("active");
}

localStorage.setItem("favorites",JSON.stringify(favorites));
renderFav();
}

function renderFav(){
let box = document.getElementById("favList");

if(favorites.length===0){
box.innerHTML="لا يوجد مفضلة";
return;
}

let html='<div class="apps">';

favorites.forEach(id=>{
if(id==="yaahlan"){
html+=`
<div class="app" onclick="showPage('yaahlan')">
<div class="heart active">❤</div>
<img src="https://via.placeholder.com/40">
<div>Yaahlan</div>
</div>`;
}
});

html+='</div>';
box.innerHTML = html;
}

window.onload = ()=>{
renderFav();

document.querySelectorAll(".heart").forEach(h=>{
if(favorites.includes(h.dataset.id)){
h.classList.add("active");
}
});
};

/* ====== BUY ====== */

function buy(price){
let id = document.getElementById("userId").value;

if(!id){
alert("ادخل ID");
return;
}

if(balance < price){
alert("الرصيد غير كافي");
return;
}

balance -= price;
updateBalance();

alert("تم الشراء بنجاح");
}

/* ====== REDEEM ====== */

function redeem(){
let code = document.getElementById("codeInput").value;

if(!code) return alert("اكتب الكود");

if(usedCodes.includes(code)){
alert("الكود مستخدم مسبقاً");
return;
}

if(codes[code]){
balance += codes[code];
usedCodes.push(code);

localStorage.setItem("usedCodes",JSON.stringify(usedCodes));

updateBalance();

alert("تم الشحن بنجاح");
document.getElementById("codeInput").value="";
}else{
alert("كود غير صحيح");
}
}

</script>

</body>
</html>
