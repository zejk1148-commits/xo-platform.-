<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Pro</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f5f5f5;padding-top:60px}
.header{
position:fixed;top:0;right:0;left:0;z-index:1000;
background:linear-gradient(to left,#2ecc71,#27ae60);
color:white;padding:12px;display:flex;justify-content:space-between
}
.box{padding:10px}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px;cursor:pointer}
.btn{background:#2ecc71;color:#fff;padding:10px;border-radius:8px;cursor:pointer;margin-top:10px}
input{width:100%;padding:10px;margin:5px 0}
</style>

</head>
<body>

<div class="header">
<div id="left">تسجيل</div>
<div>الرصيد: $<span id="balance">0</span></div>
</div>

<div class="box">

<!-- LOGIN -->
<div id="loginBox">
<h3>تسجيل الدخول</h3>
<input id="email" placeholder="email">
<input id="pass" placeholder="password" type="password">
<div class="btn" onclick="login()">دخول</div>
<div class="btn" onclick="register()">تسجيل</div>
</div>

<!-- STORE -->
<div id="store" style="display:none">

<h3>المتجر</h3>

<div class="card">
2500 💎 - 5$
<div class="btn" onclick="buy(2500,5)">شراء</div>
</div>

<div class="card">
5200 💎 - 10$
<div class="btn" onclick="buy(5200,10)">شراء</div>
</div>

<div class="card">
10600 💎 - 20$
<div class="btn" onclick="buy(10600,20)">شراء</div>
</div>

<div class="btn" onclick="openOrders()">طلباتي</div>

</div>

<!-- ORDERS -->
<div id="orders" style="display:none"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 حط بيانات Firebase هنا */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

/* تسجيل */
window.register = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

let user = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",user.user.uid),{
balance:100,
email:email
});

alert("تم التسجيل");
}

/* دخول */
window.login = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

await signInWithEmailAndPassword(auth,email,pass);
alert("تم الدخول");
}

/* مراقبة المستخدم */
onAuthStateChanged(auth, async (user)=>{
if(user){
userId = user.uid;
document.getElementById("loginBox").style.display="none";
document.getElementById("store").style.display="block";

loadUser();
}
});

/* تحميل البيانات */
async function loadUser(){
let ref = doc(db,"users",userId);
let snap = await getDoc(ref);

document.getElementById("balance").innerText = snap.data().balance;
}

/* شراء */
window.buy = async function(pack,price){

let ref = doc(db,"users",userId);
let snap = await getDoc(ref);

let bal = snap.data().balance;

if(bal < price){
alert("رصيد غير كافي");
return;
}

/* خصم الرصيد */
await updateDoc(ref,{
balance: bal - price
});

/* حفظ الطلب */
await addDoc(collection(db,"orders"),{
uid:userId,
pack:pack,
price:price,
date:new Date().toISOString()
});

alert("تم الشراء");

loadUser();
}

/* طلباتي */
window.openOrders = async function(){

document.getElementById("store").style.display="none";
document.getElementById("orders").style.display="block";

let q = await getDocs(collection(db,"orders"));

let html = "<h3>طلباتي</h3>";

q.forEach(d=>{
let o = d.data();
if(o.uid == userId){
html += `<div class='card'>💎 ${o.pack} - $${o.price}</div>`;
}
});

document.getElementById("orders").innerHTML = html;
}

</script>

</body>
</html>
