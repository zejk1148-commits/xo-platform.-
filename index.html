<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawy Platform</title>

<style>
body{margin:0;font-family:Arial;background:#38bdf8;}

.header{background:#22c55e;padding:12px;display:flex;justify-content:space-between;color:white;}
.menu-btn{font-size:22px;cursor:pointer;}
.balance-box{display:flex;gap:10px;align-items:center;}
.add-btn{background:white;color:black;border-radius:50%;padding:3px 10px;cursor:pointer;}

.sidebar{position:fixed;top:0;right:0;width:260px;height:100%;background:white;transform:translateX(100%);transition:.3s;z-index:1000;padding-top:60px;}
.sidebar.active{transform:translateX(0);}
.sidebar a{display:block;padding:15px;border-bottom:1px solid #eee;cursor:pointer;}

.overlay{position:fixed;width:100%;height:100%;display:none;z-index:999;}

.apps{padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.app{background:white;border-radius:12px;padding:8px;text-align:center;position:relative;}
.app img{width:40px;height:40px;}

.heart{position:absolute;top:5px;left:5px;color:gray;cursor:pointer;}
.heart.active{color:red;}

.page{display:none;padding:15px;}
.active-page{display:block;}

.bottom-bar{position:fixed;bottom:0;width:100%;background:#22c55e;display:flex;justify-content:space-around;padding:8px 0;}
.icon{text-align:center;font-size:12px;cursor:pointer;}

.package{background:white;margin:10px 0;padding:10px;border-radius:10px;}
.buy-btn{background:#22c55e;border:none;padding:8px;width:100%;margin-top:5px;cursor:pointer;color:white;}

input{width:100%;padding:10px;margin-top:10px;}

.success-box{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:white;padding:15px;border-radius:15px;display:none;}
.ok-btn{background:#22c55e;color:white;padding:10px;border-radius:20px;text-align:center;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div class="balance-box">
    <div id="balanceText">رصيدك: 0$</div>
    <div class="add-btn" onclick="showPage('addbalance')">+</div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">الرئيسية</a>
  <a onclick="showPage('favorites')">المفضلة</a>
  <a onclick="showPage('orders')">طلباتي</a>
  <a onclick="showPage('payments')">دفعاتي</a>
  <a onclick="showPage('wallet')">محفظتي</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<div id="home" class="page active-page">
  <div class="apps">

    <div class="app" onclick="showPage('yaahlan')">
      <div class="heart" data-name="yaahlan" onclick="toggleHeart(event,this,'yaahlan')">❤</div>
      <img src="PUT_IMAGE_LINK_HERE">
      <div>Yaahlan</div>
    </div>

  </div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
  <h2>المفضلة ❤️</h2>
  <div id="favList"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="page"><h2>طلباتي 📦</h2></div>

<!-- PAYMENTS -->
<div id="payments" class="page"><h2>دفعاتي 💳</h2></div>

<!-- WALLET -->
<div id="wallet" class="page"><h2>محفظتي 💼</h2></div>

<!-- APP -->
<div id="yaahlan" class="page">
  <h2>Yaahlan</h2>

  <input id="userId" placeholder="ادخل ID">

  <div class="package">5200 - 10$ <button class="buy-btn" onclick="buyNow(10)">شراء</button></div>
  <div class="package">10600 - 20$ <button class="buy-btn" onclick="buyNow(20)">شراء</button></div>
  <div class="package">27000 - 50$ <button class="buy-btn" onclick="buyNow(50)">شراء</button></div>
  <div class="package">40000 - 75$ <button class="buy-btn" onclick="buyNow(75)">شراء</button></div>
  <div class="package">52000 - 100$ <button class="buy-btn" onclick="buyNow(100)">شراء</button></div>
</div>

<!-- ADD BALANCE -->
<div id="addbalance" class="page">
  <h2>إضافة رصيد</h2>

  <button onclick="selectMethod('Ziraat')">Ziraat Bank</button>
  <button onclick="selectMethod('ShamCash')">ShamCash</button>

  <div id="paymentInfo"></div>

  <input id="name" placeholder="اسمك">
  <input id="amount" placeholder="المبلغ">
  <input id="txid" placeholder="رقم العملية">

  <button class="buy-btn" onclick="sendBalance()">تأكيد</button>
</div>

<!-- SUCCESS -->
<div id="successBox" class="success-box">
  <div>تمت العملية</div>
  <div class="ok-btn" onclick="hideSuccess()">✔️ حسناً</div>
</div>

<!-- BOTTOM -->
<div class="bottom-bar">
  <div class="icon" onclick="showPage('wallet')">💼<br>محفظتي</div>
  <div class="icon" onclick="showPage('favorites')">❤<br>المفضلة</div>
  <div class="icon" onclick="showPage('home')">🏠<br>الرئيسية</div>
  <div class="icon" onclick="showPage('orders')">📦<br>طلباتي</div>
  <div class="icon" onclick="showPage('payments')">💳<br>دفعاتي</div>
</div>

<script>
const TOKEN="8631734604:AAFnNucRhPjurOzCGUyE-uOgsdNKAGCHG9s";
const CHAT_ID="8044738479";

let balance=0;
let method="";
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

window.onload = function(){
  renderFav();
  restoreHearts();
};

function updateBalance(){
  balanceText.innerText="رصيدك: "+balance+"$";
}

function sendToTelegram(text){
  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID,text:text})
  });
}

function openMenu(){sidebar.classList.add("active");overlay.style.display="block";}
function closeMenu(){sidebar.classList.remove("active");overlay.style.display="none";}

function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active-page"));
  document.getElementById(page).classList.add("active-page");
}

function toggleHeart(e,el,id){
  e.stopPropagation();

  if(favorites.includes(id)){
    favorites = favorites.filter(x=>x!==id);
    el.classList.remove("active");
  }else{
    favorites.push(id);
    el.classList.add("active");
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderFav();
}

function renderFav(){
  let container=document.getElementById("favList");

  if(favorites.length===0){
    container.innerHTML="لا يوجد مفضلة";
    return;
  }

  let html='<div class="apps">';
  favorites.forEach(app=>{
    if(app==="yaahlan"){
      html+=`
      <div class="app" onclick="showPage('yaahlan')">
        <div class="heart active" onclick="toggleHeart(event,this,'yaahlan')">❤</div>
        <img src="PUT_IMAGE_LINK_HERE">
        <div>Yaahlan</div>
      </div>`;
    }
  });
  html+='</div>';
  container.innerHTML=html;
}

function restoreHearts(){
  document.querySelectorAll(".heart").forEach(el=>{
    let name=el.getAttribute("data-name");
    if(favorites.includes(name)){
      el.classList.add("active");
    }
  });
}

function showSuccess(){successBox.style.display="block";}
function hideSuccess(){successBox.style.display="none";}

function buyNow(price){
  let id=document.getElementById("userId").value;

  if(!id){alert("ادخل ID");return;}
  if(balance<price){alert("رصيدك غير كافي");return;}

  balance-=price;
  updateBalance();

  sendToTelegram(`طلب شراء\nID:${id}\n${price}$`);

  document.getElementById("userId").value="";
  showSuccess();
}

function selectMethod(type){
  method=type;
  if(type==="Ziraat"){
    paymentInfo.innerHTML=`🏦 Ziraat Bank<br>TRXXXX`;
  }else{
    paymentInfo.innerHTML=`💰 ShamCash`;
  }
}

function sendBalance(){
  let name=document.getElementById("name").value;
  let amount=document.getElementById("amount").value;
  let txid=document.getElementById("txid").value;

  if(!name||!amount||!txid){alert("املأ الحقول");return;}

  sendToTelegram(`طلب رصيد\n${name}\n${amount}\n${txid}`);

  document.getElementById("name").value="";
  document.getElementById("amount").value="";
  document.getElementById("txid").value="";
  showSuccess();
}
</script>

</body>
  </html>
