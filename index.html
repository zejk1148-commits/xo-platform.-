<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO App</title>

<style>
body{margin:0;font-family:Arial;background:#e0f2fe}

/* HEADER */
.header{
background:#16a34a;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
}

/* APPS GRID */
.apps{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.app{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
position:relative;
}

.app img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
}

.heart{
position:absolute;
top:5px;left:5px;
cursor:pointer;
}
.heart.active{color:red}

/* BOTTOM BAR */
.bottom{
position:fixed;
bottom:0;left:0;right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ccc;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* PACKAGES */
.package{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* TABLE */
table{width:100%;background:white;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:6px;text-align:center}

button{padding:5px}
input{width:100%;padding:8px;margin-top:10px}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>☰</div>
<div id="balance">0$</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES (EMPTY BY DEFAULT) -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة 💼</h3>
<div id="walletBox"></div>
</div>

<!-- YA AHLAN PACKAGES -->
<div id="yaahlan" class="page">
<h3>Yaahlan 💎</h3>

<div class="package">10$ = 5200 💎</div>
<div class="package">20$ = 10600 💎</div>
<div class="package">50$ = 27000 💎</div>
<div class="package">100$ = 52000 💎</div>

</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن كود 💳</h3>
<input id="code" placeholder="أدخل الكود">
<button onclick="redeem()">تفعيل</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">

<h3>لوحة الأدمن 👑</h3>

<h4>إنشاء كود</h4>
<input id="amount" placeholder="المبلغ">
<button onclick="createCode()">إنشاء</button>

<div id="codesBox"></div>

<h4>المستخدمين</h4>
<table>
<tr><th>ID</th><th>Admin</th><th>Ban</th><th>Action</th></tr>
<tbody id="usersBox"></tbody>
</table>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">
<div onclick="show('home')">🏠</div>
<div onclick="show('favorites')">❤️</div>
<div onclick="show('wallet')">💼</div>
<div onclick="show('yaahlan')">💎</div>
<div onclick="show('redeem')">💳</div>
<div onclick="show('admin')">👑</div>
</div>

<script>

/* DATA */
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let fav = JSON.parse(localStorage.getItem("fav")) || [];
let codes = JSON.parse(localStorage.getItem("codes")) || {};
let used = JSON.parse(localStorage.getItem("used")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

/* USER */
let myId = localStorage.getItem("myId");
if(!myId){
myId = "U"+Math.floor(Math.random()*999999);
localStorage.setItem("myId",myId);
}

if(!users.find(u=>u.id===myId)){
users.push({id:myId,admin:false,ban:false});
saveUsers();
}

function saveUsers(){
localStorage.setItem("users",JSON.stringify(users));
}

/* APPS */
const apps = [
{name:"yaahlan",img:"https://via.placeholder.com/150"},
{name:"sugo",img:"https://via.placeholder.com/150"},
{name:"chat",img:"https://via.placeholder.com/150"},
{name:"game",img:"https://via.placeholder.com/150"}
];

function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";

apps.forEach(a=>{
box.innerHTML+=`
<div class="app">
<div class="heart ${fav.includes(a.name)?'active':''}" onclick="toggleFav(event,'${a.name}')">❤</div>
<img src="${a.img}">
<div>${a.name}</div>
</div>`;
});
}

/* FAVORITES EMPTY UNTIL CLICK */
function toggleFav(e,id){
e.stopPropagation();
if(fav.includes(id)){
fav=fav.filter(x=>x!==id);
}else{
fav.push(id);
}
localStorage.setItem("fav",JSON.stringify(fav));
renderApps();
renderFav();
}

function renderFav(){
let box=document.getElementById("favList");
box.innerHTML = fav.length ? fav.join("<br>") : "";
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
renderUsers();
renderCodes();
renderWallet();
}

/* WALLET */
function renderWallet(){
document.getElementById("walletBox").innerHTML = balance + "$";
document.getElementById("balance").innerText = balance + "$";
}

/* REDEEM */
function redeem(){
let c=document.getElementById("code").value.trim();

if(used.includes(c)) return alert("مستخدم");

if(codes[c]){
balance += parseFloat(codes[c]);
used.push(c);

localStorage.setItem("balance",balance);
localStorage.setItem("used",JSON.stringify(used));

renderWallet();
alert("تم الشحن +" + codes[c]);
}else{
alert("خطأ");
}
}

/* CREATE CODE */
function createCode(){
let a=document.getElementById("amount").value;

let code="XO-"+Math.random().toString(36).substring(2,8).toUpperCase();

codes[code]=a;
localStorage.setItem("codes",JSON.stringify(codes));

renderCodes();
}

function renderCodes(){
let box=document.getElementById("codesBox");
box.innerHTML="<h4>Codes</h4>";

for(let c in codes){
box.innerHTML+=`<div>${c} = ${codes[c]}$</div>`;
}
}

/* USERS */
function renderUsers(){
let box=document.getElementById("usersBox");
box.innerHTML="";

users.forEach(u=>{
box.innerHTML+=`
<tr>
<td>${u.id}</td>
<td>${u.admin?"✔":"❌"}</td>
<td>${u.ban?"⛔":"✔"}</td>
<td>
<button onclick="toggleAdmin('${u.id}')">Admin</button>
<button onclick="toggleBan('${u.id}')">Ban</button>
</td>
</tr>`;
});
}

function toggleAdmin(id){
let u=users.find(x=>x.id===id);
u.admin=!u.admin;
saveUsers();
renderUsers();
}

function toggleBan(id){
let u=users.find(x=>x.id===id);
u.ban=!u.ban;
saveUsers();
renderUsers();
}

/* INIT */
renderApps();
renderWallet();
renderFav();

</script>

</body>
</html>
