<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawy Platform</title>

<style>
body{margin:0;font-family:Arial;background:#38bdf8;}

.header{
  background:#22c55e;
  padding:12px;
  display:flex;
  justify-content:space-between;
  color:white;
}

.menu-btn{cursor:pointer;font-size:22px;}

.balance-box{display:flex;gap:10px;align-items:center;}

.add-btn{
  background:white;
  color:black;
  border-radius:50%;
  padding:3px 10px;
  cursor:pointer;
}

/* Sidebar */
.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:260px;
  height:100%;
  background:white;
  transform:translateX(100%);
  transition:.3s;
  z-index:1000;
  padding-top:60px;
}
.sidebar.active{transform:translateX(0);}

.sidebar a{
  display:block;
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  z-index:999;
}

/* Apps */
.apps{
  padding:10px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.app{
  background:white;
  border-radius:12px;
  padding:8px;
  text-align:center;
  position:relative;
}

.heart{
  position:absolute;
  top:5px;
  left:5px;
  cursor:pointer;
  color:gray;
}
.heart.active{color:red;}

.page{display:none;padding:15px;}
.active-page{display:block;}

.package{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.buy-btn{
  background:#22c55e;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  margin-top:5px;
  border-radius:20px;
  cursor:pointer;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:20px;
}

/* Success */
.success-box{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:15px;
  display:none;
}

.ok-btn{
  background:#22c55e;
  color:white;
  padding:10px 18px;
  border-radius:999px;
  margin:10px auto 0;
  text-align:center;
  width:fit-content;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div class="balance-box">
    <div id="balanceText">رصيدك: 0$</div>
    <div class="add-btn" onclick="showPage('addbalance')">+</div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">الرئيسية</a>
  <a onclick="showPage('addbalance')">إضافة رصيد</a>
  <a onclick="showPage('admin')">لوحة التحكم</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<div id="home" class="page active-page">
  <div class="apps">

    <div class="app" onclick="showPage('yaahlan')">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      Yaahlan
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      Xena
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      YoParti
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      Sugo
    </div>

  </div>
</div>

<!-- APP -->
<div id="yaahlan" class="page">
  <h2>Yaahlan</h2>

  <input id="userId" placeholder="ادخل ID">

  <div class="package">10$
    <button class="buy-btn" onclick="buyNow(10)">شراء</button>
  </div>

  <div class="package">20$
    <button class="buy-btn" onclick="buyNow(20)">شراء</button>
  </div>
</div>

<!-- ADD BALANCE -->
<div id="addbalance" class="page">
  <h2>طلب رصيد</h2>

  <input id="name" placeholder="اسمك">
  <input id="amount" placeholder="المبلغ">
  <input id="txid" placeholder="رقم العملية">

  <button class="buy-btn" onclick="sendBalance()">إرسال الطلب</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>لوحة التحكم 🔐</h2>

  <input id="adminPass" placeholder="كلمة السر">
  <button class="buy-btn" onclick="loginAdmin()">دخول</button>

  <div id="adminPanel" style="display:none;">
    <input id="addAmount" placeholder="كم تريد إضافة">
    <button class="buy-btn" onclick="addBalance()">إضافة رصيد</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successBox" class="success-box">
  <div style="text-align:center;">تمت العملية بنجاح</div>
  <div class="ok-btn" onclick="hideSuccess()">✔️ حسناً</div>
</div>

<script>
const TOKEN="8631734604:AAFnNucRhPjurOzCGUyE-uOgsdNKAGCHG9s";
const CHAT_ID="8044738479";

let balance = 0;

function updateBalance(){
  document.getElementById("balanceText").innerText="رصيدك: "+balance+"$";
}

/* Telegram */
function sendToTelegram(text){
  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID,text:text})
  });
}

/* Menu */
function openMenu(){sidebar.classList.add("active");overlay.style.display="block";}
function closeMenu(){sidebar.classList.remove("active");overlay.style.display="none";}

/* Pages */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active-page"));
  document.getElementById(page).classList.add("active-page");
}

/* Favorite */
function toggleHeart(e,el){
  e.stopPropagation();
  el.classList.toggle("active");
}

/* Success */
function showSuccess(){successBox.style.display="block";}
function hideSuccess(){successBox.style.display="none";}

/* BUY */
function buyNow(price){
  let id=document.getElementById("userId").value;

  if(!id){alert("ادخل ID");return;}

  if(balance < price){
    alert("رصيدك غير كافي");
    return;
  }

  balance -= price;
  updateBalance();

  sendToTelegram(`🛒 طلب شراء
ID: ${id}
السعر: ${price}$`);

  document.getElementById("userId").value="";
  showSuccess();
}

/* BALANCE REQUEST */
function sendBalance(){
  let name=document.getElementById("name").value;
  let amount=document.getElementById("amount").value;
  let txid=document.getElementById("txid").value;

  if(!name||!amount||!txid){
    alert("املأ كل الحقول");
    return;
  }

  sendToTelegram(`💰 طلب رصيد
الاسم: ${name}
المبلغ: ${amount}
العملية: ${txid}`);

  document.getElementById("name").value="";
  document.getElementById("amount").value="";
  document.getElementById("txid").value="";
  showSuccess();
}

/* ADMIN */
function loginAdmin(){
  if(document.getElementById("adminPass").value==="1234"){
    document.getElementById("adminPanel").style.display="block";
  }else{
    alert("كلمة السر غلط");
  }
}

function addBalance(){
  let amt=parseInt(document.getElementById("addAmount").value);

  if(!amt){alert("ادخل رقم");return;}

  balance+=amt;
  updateBalance();
  document.getElementById("addAmount").value="";
  showSuccess();
}
</script>

</body>
</html>
