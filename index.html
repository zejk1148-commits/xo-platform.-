<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO STORE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6}

/* TOP BAR */
.topbar{
background:#16a34a;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
font-weight:bold;
}

/* SIDEBAR */
.sidebar{
position:fixed;
right:0;top:0;
width:260px;height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
padding:15px;
z-index:999;
}
.sidebar.open{transform:translateX(0)}

.menu-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* BOTTOM NAV */
.bottom{
position:fixed;
bottom:0;left:0;right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
font-size:20px;
border-top:1px solid #ddd;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.app{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
position:relative;
cursor:pointer;
}

.heart{
position:absolute;
top:5px;left:5px;
color:#aaa;
}
.heart.active{color:red}

/* BOX */
.box{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}
.green{color:green}
.red{color:red}
</style>
</head>

<body>

<div class="topbar">
<div onclick="toggleSidebar()">☰ MENU</div>
<div id="balanceTop">0$</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menu-item" onclick="show('home')">🏠 الرئيسية</div>
<div class="menu-item" onclick="show('redeem')">💳 الشحن</div>
<div class="menu-item" onclick="show('wallet')">💼 المحفظة</div>
<div class="menu-item" onclick="show('favorites')">❤️ المفضلة</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة</h3>
<p class="green">الوارد: <span id="income">0</span>$</p>
<p class="red">المصروف: <span id="spent">0</span>$</p>
</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن كود 💳</h3>
<input id="code" placeholder="أدخل الكود">
<button onclick="redeem()">تفعيل</button>
</div>

<script>

/* 🔴 Telegram (ضع بياناتك هنا) */
const BOT_TOKEN = "PUT_YOUR_BOT_TOKEN";
const CHAT_ID = "PUT_YOUR_CHAT_ID";

/* DATA */
let income=0;
let spent=0;
let favorites=[];

/* APPS */
const apps = [
{name:"يا أهلاً",img:"https://via.placeholder.com/150"},
{name:"Game",img:"https://via.placeholder.com/150"},
{name:"VIP",img:"https://via.placeholder.com/150"},
{name:"Chat",img:"https://via.placeholder.com/150"},
{name:"Soul",img:"https://via.placeholder.com/150"},
{name:"Xena",img:"https://via.placeholder.com/150"}
];

/* RENDER */
function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";

apps.forEach(a=>{
box.innerHTML+=`
<div class="app" onclick="buy('${a.name}')">
<div class="heart" onclick="event.stopPropagation();toggleFav('${a.name}',this)">❤</div>
<img src="${a.img}" width="100%">
<div>${a.name}</div>
</div>`;
});
}

/* BUY */
function buy(item){

let price=1;

spent+=price;
income+=price;

sendTelegram(item,price,"BUY");

update();
}

/* REDEEM */
function redeem(){
let code=document.getElementById("code").value;

income+=5;

sendTelegram(code,5,"REDEEM");

update();
}

/* TELEGRAM */
function sendTelegram(item,price,type){

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:`
🛒 TYPE: ${type}
📦 ITEM: ${item}
💰 PRICE: ${price}$
`
})
});

}

/* FAVORITE */
function toggleFav(name,el){

el.classList.toggle("active");

if(favorites.includes(name)){
favorites=favorites.filter(f=>f!==name);
}else{
favorites.push(name);
}

renderFav();
}

function renderFav(){
let box=document.getElementById("favList");
box.innerHTML="";

favorites.forEach(f=>{
box.innerHTML+=`<div class="box">❤️ ${f}</div>`;
});
}

/* WALLET */
function update(){
document.getElementById("income").innerText=income;
document.getElementById("spent").innerText=spent;
document.getElementById("balanceTop").innerText=(income-spent)+"$";
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* SIDEBAR */
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

renderApps();
update();

</script>

</body>
</html>
