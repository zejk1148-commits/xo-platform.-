<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>واجهة شحن</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
}

/* الشريط العلوي */
.topbar {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* زر القائمة */
.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* الشريط الجانبي */
.sidebar {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  background: #222;
  color: white;
  transition: 0.3s;
  padding-top: 20px;
}

.sidebar.active {
  right: 0;
}

/* عناصر */
.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #333;
}

.sidebar a:hover {
  background: #333;
}

/* الخلفية */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
}

.overlay.active {
  display: block;
}

/* المحتوى */
.content {
  padding: 20px;
}

/* كروت */
.card {
  background: #f5f5f5;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}
button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
}
</style>

</head>

<body>

<div class="topbar">
  <span class="menu-btn" onclick="openMenu()">☰</span>
  <span>الرصيد: <span id="balance">0</span></span>
</div>

<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">🏠 الرئيسية</a>
  <a onclick="showPage('charge')">💳 إضافة رصيد</a>
  <a onclick="showPage('orders')">📦 طلباتي</a>
  <a onclick="showPage('payments')">💰 دفعاتي</a>
  <a onclick="showPage('wallet')">👛 المحفظة</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="content" id="content"></div>

<script>
let sidebar = document.getElementById("sidebar");
let overlay = document.getElementById("overlay");

// فتح/إغلاق
function openMenu() {
  sidebar.classList.add("active");
  overlay.classList.add("active");
}
function closeMenu() {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

// الصفحات
function showPage(page) {
  let content = document.getElementById("content");

  if (page === "home") {
    content.innerHTML = `
      <h2>🏠 الرئيسية</h2>
      <div class="card">مرحبا بك في موقع الشحن</div>
      <div class="card">رصيدك الحالي: ${localStorage.getItem("balance") || 0}</div>
    `;
  }

  if (page === "charge") {
    content.innerHTML = `
      <h2>💳 إضافة رصيد</h2>
      <div class="card">
        <p>اختر قيمة الشحن</p>
        <button onclick="addBalance(10)">شحن 10</button>
        <button onclick="addBalance(50)">شحن 50</button>
      </div>
    `;
  }

  if (page === "orders") {
    content.innerHTML = `
      <h2>📦 طلباتي</h2>
      <div class="card">لا يوجد طلبات حالياً</div>
    `;
  }

  if (page === "payments") {
    content.innerHTML = `
      <h2>💰 دفعاتي</h2>
      <div class="card">لا يوجد دفعات</div>
    `;
  }

  if (page === "wallet") {
    content.innerHTML = `
      <h2>👛 المحفظة</h2>
      <div class="card">رصيدك: ${localStorage.getItem("balance") || 0}</div>
      <button onclick="withdraw()">سحب</button>
    `;
  }

  closeMenu();
}

// الرصيد
function addBalance(amount) {
  let balance = parseInt(localStorage.getItem("balance") || 0);
  balance += amount;
  localStorage.setItem("balance", balance);
  document.getElementById("balance").innerText = balance;
  alert("تم الشحن بنجاح");
}

// سحب
function withdraw() {
  alert("ميزة السحب لاحقاً");
}

// تحميل
window.onload = function () {
  let balance = localStorage.getItem("balance") || 0;
  document.getElementById("balance").innerText = balance;
  showPage("home");
};
</script>

</body>
</html>
