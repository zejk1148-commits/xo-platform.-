<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع الشحن</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #38bdf8;
}

/* الشريط العلوي */
.header {
  background: #22c55e;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* زر القائمة */
.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* الرصيد */
.balance-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.add-btn {
  background: white;
  border-radius: 50%;
  padding: 5px 10px;
  cursor: pointer;
}

/* الشريط الجانبي */
.sidebar {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  height: 100%;
  background: white;
  transform: translateX(100%);
  transition: 0.3s;
  z-index: 1000;
  padding-top: 60px;
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar a {
  display: block;
  padding: 15px;
  border-bottom: 1px solid #eee;
  color: black;
  text-decoration: none;
}

/* الخلفية */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
}

/* التطبيقات */
.apps {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.app {
  background: white;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  position: relative;
}

/* القلب */
.heart {
  position: absolute;
  top: 8px;
  left: 8px;
  cursor: pointer;
  color: gray;
  font-size: 18px;
}

.heart.active {
  color: red;
}

/* صورة التطبيق */
.app img {
  width: 60px;
  height: 60px;
}

/* الشريط السفلي */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #22c55e;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.icon {
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.icon:active {
  transform: scale(1.2);
}

/* صفحة التفاصيل */
.page {
  display: none;
  padding: 20px;
}

.active-page {
  display: block;
}

.package {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.buy-btn {
  background: #22c55e;
  border: none;
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  cursor: pointer;
}
</style>

</head>
<body>

<!-- الشريط العلوي -->
<div class="header">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div class="balance-box">
    <div>رصيدك: 0$</div>
    <div class="add-btn">+</div>
  </div>
</div>

<!-- الشريط الجانبي -->
<div class="sidebar" id="sidebar">
  <a onclick="showPage('home')">الرئيسية</a>
  <a>إضافة رصيد</a>
  <a onclick="showPage('orders')">طلباتي</a>
  <a>دفعاتي</a>
  <a>المحفظة</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active-page">
  <div class="apps">

    <div class="app" onclick="showPage('yaahlan')">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      <img src="https://via.placeholder.com/60">
      <div>Yaahlan</div>
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      <img src="https://via.placeholder.com/60">
      <div>Xena</div>
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      <img src="https://via.placeholder.com/60">
      <div>YoParti</div>
    </div>

    <div class="app">
      <div class="heart" onclick="toggleHeart(event,this)">❤</div>
      <img src="https://via.placeholder.com/60">
      <div>Sugo</div>
    </div>

  </div>
</div>

<!-- صفحة يااهلن -->
<div id="yaahlan" class="page">
  <h2>Yaahlan</h2>

  <input placeholder="ادخل ID" style="width:100%;padding:10px;margin-bottom:10px;">

  <div class="package">5200 ألماسة - 10$
    <button class="buy-btn">شراء</button>
  </div>

  <div class="package">10600 ألماسة - 20$
    <button class="buy-btn">شراء</button>
  </div>

  <div class="package">27000 ألماسة - 50$
    <button class="buy-btn">شراء</button>
  </div>

  <div class="package">40000 ألماسة - 75$
    <button class="buy-btn">شراء</button>
  </div>

  <div class="package">52000 ألماسة - 100$
    <button class="buy-btn">شراء</button>
  </div>

</div>

<!-- الطلبات -->
<div id="orders" class="page">
  <h2>طلباتي</h2>
  <p>لا يوجد طلبات حالياً</p>
</div>

<!-- الشريط السفلي -->
<div class="bottom-bar">
  <div class="icon">💼<br>المحفظة</div>
  <div class="icon">❤<br>المفضلة</div>
  <div class="icon" onclick="showPage('home')">🏠<br>الرئيسية</div>
  <div class="icon">📦<br>طلباتي</div>
  <div class="icon">💳<br>دفعاتي</div>
</div>

<script>
function openMenu() {
  sidebar.classList.add("active");
  overlay.style.display = "block";
}

function closeMenu() {
  sidebar.classList.remove("active");
  overlay.style.display = "none";
}

function toggleHeart(e, el) {
  e.stopPropagation();
  el.classList.toggle("active");
}

function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
  document.getElementById(page).classList.add("active-page");
  closeMenu();
}
</script>

</body>
</html>
