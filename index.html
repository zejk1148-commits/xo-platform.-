<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Store</title>

<style>
html,body{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
  padding-top:60px;
}

.header{
  position:fixed;
  top:0;
  right:0;
  left:0;
  z-index:1000;
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.login-card{
  width:90%;
  max-width:320px;
  margin:50px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  text-align:center;
}

.login-card input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

.login-card button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.login-card button:nth-child(4){
  background:#3498db;
}

#errorBox{
  color:red;
  font-size:13px;
  margin-top:5px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:linear-gradient(to left,#3498db,#2ecc71);
  color:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.pack-card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.mas{color:#2ecc71}
.price{color:#e67e22}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}
</style>
</head>

<body>

<div class="header">
<div>الرصيد: $<span id="balance">0</span></div>
<div onclick="openOrders()">طلباتي</div>
</div>

<div id="loginBox" class="login-card">
<h2>تسجيل الدخول</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<div id="errorBox"></div>

<button onclick="login()">دخول</button>
<button onclick="register()">تسجيل</button>
</div>

<div id="store" style="display:none">

<div class="grid">
<div class="card" onclick="showPacks('يا أهلا')">يا أهلا</div>
<div class="card" onclick="showPacks('Xena')">Xena</div>
<div class="card" onclick="showPacks('Sugo')">Sugo</div>
</div>

<div id="packs"></div>
</div>

<div id="orders" style="display:none"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* تعريف العناصر */
const loginBox = document.getElementById("loginBox");
const store = document.getElementById("store");
const orders = document.getElementById("orders");
const balance = document.getElementById("balance");
const email = document.getElementById("email");
const pass = document.getElementById("pass");
const errorBox = document.getElementById("errorBox");
const packs = document.getElementById("packs");

let uid=null;

/* دخول للمتجر */
function goToApp(){
loginBox.style.display="none";
store.style.display="block";
orders.style.display="none";
load();
}

/* تسجيل */
window.register = async ()=>{
try{
let u = await createUserWithEmailAndPassword(auth,email.value,pass.value);

uid = u.user.uid;

await setDoc(doc(db,"users",uid),{
balance:100,
email:email.value
});

errorBox.style.color="green";
errorBox.innerText="تم التسجيل";

goToApp();

}catch(e){
errorBox.style.color="red";
errorBox.innerText="خطأ في التسجيل";
}
}

/* دخول */
window.login = async ()=>{
try{
let u = await signInWithEmailAndPassword(auth,email.value,pass.value);

uid = u.user.uid;

errorBox.style.color="green";
errorBox.innerText="تم الدخول";

goToApp();

}catch(e){
errorBox.style.color="red";
errorBox.innerText="خطأ في البيانات";
}
}

/* دخول تلقائي */
onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
goToApp();
}
});

/* تحميل الرصيد */
async function load(){
let r=await getDoc(doc(db,"users",uid));
balance.innerText=r.data().balance;
}

/* عرض الباقات */
window.showPacks = (appName)=>{
packs.innerHTML = `
<div class="pack-card">
<div class="mas">2500000 ماسة</div>
<div class="price">$5</div>
<div class="buy-btn" onclick="buy(5,'${appName} - 2.5M')">شراء</div>
</div>
`;
}

/* شراء */
window.buy = async (price,pack)=>{

let r=await getDoc(doc(db,"users",uid));
let bal=r.data().balance;

if(bal<price){
alert("رصيد غير كافي");
return;
}

await updateDoc(doc(db,"users",uid),{
balance:bal-price
});

await addDoc(collection(db,"orders"),{
uid,
pack,
price,
date:new Date()
});

alert("تم الشراء ✅");
load();
}

/* طلباتي */
window.openOrders = async ()=>{

store.style.display="none";
orders.style.display="block";

let q=await getDocs(collection(db,"orders"));

let html="<h3>طلباتي</h3>";

q.forEach(d=>{
let o=d.data();
if(o.uid==uid){
html+=`<div class='pack-card'>💎 ${o.pack} - ${o.price}$</div>`;
}
});

orders.innerHTML=html;
}

</script>

</body>
</html>
