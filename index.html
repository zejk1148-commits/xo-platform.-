<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر التطبيقات</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f5f5f5}

.header{
  background:#2ecc71;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.sidebar{
  position:fixed;
  right:-200px;
  top:0;
  width:200px;
  height:100%;
  background:#333;
  color:white;
  padding:15px;
  transition:0.3s;
}
.sidebar.open{right:0}

.sidebar a{
  display:block;
  padding:10px;
  margin:5px 0;
  background:#444;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.pack{background:white;margin:10px;padding:10px;border-radius:10px}

button{
  background:#2ecc71;
  color:white;
  border:none;
  padding:8px;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
</div>

<div id="home">
<div class="header">
<div onclick="toggle()">☰</div>
<div>متجر التطبيقات</div>
</div>

<div class="grid" id="apps"></div>
</div>

<div id="appPage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div id="title"></div>
</div>
<div id="packs"></div>
</div>

<div id="balancePage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>إضافة رصيد</div>
</div>
</div>

<!-- 🔥 صفحة الشحن -->
<div id="chargePage" style="display:none">
<div class="header">
<div onclick="goHome()">رجوع</div>
<div>شحن الرصيد</div>
</div>

<div style="padding:10px">

<div class="card">💳 تحويل بنكي</div>
<div class="card">📱 شام كاش</div>

</div>
</div>

<div id="ordersPage" style="display:none"></div>

<script>
function toggle(){
sidebar.classList.toggle("open")
}

const apps=[
{name:"Zina Live",img:"https://i.ibb.co/gM9GsQbt/image.jpg",packs:[2500,5200]},
{name:"Sugo",img:"https://i.ibb.co/qVF1fnS/image.jpg",packs:[2500,5200]}
];

function loadApps(){
let html="";
apps.forEach((a,i)=>{
html+=`
<div class="card" onclick="openApp(${i})">
<img src="${a.img}" width="50">
<div>${a.name}</div>
</div>`;
});
apps.innerHTML=html;
}
loadApps();

function openApp(i){
home.style.display="none";
appPage.style.display="block";

let a=apps[i];
title.innerText=a.name;

let html="";
a.packs.forEach(p=>{
html+=`
<div class="pack">
<div>${p}</div>
<button>شراء</button>
</div>`;
});

packs.innerHTML=html;
}

function goHome(){
home.style.display="block";
appPage.style.display="none";
balancePage.style.display="none";
chargePage.style.display="none";
}

function openBalance(){
home.style.display="none";
balancePage.style.display="block";
}

function openCharge(){
home.style.display="none";
chargePage.style.display="block";
}

function openOrders(){
alert("قريباً");
}
</script>

</body>
</html>
