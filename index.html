<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>متجر التطبيقات</title>

<style>
html, body {
  margin:0 !important;
  padding:0 !important;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

body{position: relative;}

.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  padding-top:22px;
  margin-top:-10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.header div:first-child{
  z-index:999999;
  position:relative;
  font-size:20px;
}

.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:190px;
  height:100%;
  background:#1e1e2f;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
}
.sidebar.open{transform:translateX(0);}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  background:#2c2c44;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:9998;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(80px, 1fr));
  gap:10px;
  padding:10px;
}

#balancePage .grid{
  grid-template-columns:repeat(2,1fr);
} 

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:60px;
  height:60px;
  border-radius:14px;
  object-fit:cover;
}

.card-name{
  font-size:13px;
  margin-top:5px;
  font-weight:bold;
}

.heart{
  position:absolute;
  top:5px;
  left:5px;
  font-size:18px;
  cursor:pointer;
}

.pack-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:85%;
  max-width:260px;
  position:relative;
}

.close-btn{
  position:absolute;
  top:8px;
  left:10px;
  font-size:18px;
  cursor:pointer;
}

.modal input{
  width:90%;
  padding:8px;
  margin:10px auto;
  display:block;
}

.modal button{
  display:block;
  margin:10px auto 0;
  background:#2ecc71;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h3 style="text-align:center;">القائمة</h3>

  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="openFav()">❤️ المفضلة</a>
</div>

<div class="overlay" id="overlay"></div>

<div id="home">
<div class="header">
<div onclick="toggleSidebar()">☰</div>

<div style="display:flex; gap:10px; align-items:center;">
  <div id="appTitle" style="display:none;"></div>
  <div id="balanceText">الرصيد: $120</div>
</div>

</div>

<div class="grid" id="appsGrid"></div>
</div>

<div id="appPage" style="display:none">
<div class="header">
<div onclick="back()">رجوع</div>
<div id="appName"></div>
</div>
<div id="packs"></div>
</div>

<div id="ordersPage" style="display:none"></div>

<div id="balancePage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>إضافة رصيد</div>
  </div>
<div class="grid">

<div class="card" onclick="openShamCash()">
  <img src="https://i.ibb.co/fY1MpH8d/IMG.jpg">
  <div class="card-name">شام كاش</div>
</div>

<div class="card" onclick="openZiraat()">
  <img src="https://i.ibb.co/qzq6hMN/IMG.jpg">
  <div class="card-name">زراعات بنك</div>
</div>

</div>
</div>

<!-- ✅ إصلاح هنا -->
<div id="ziraatPage" style="display:none; padding:15px;">

  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>زراعات بنك</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <div>💳 رقم الحساب: 987654321</div>
    <div>👤 الاسم: اسمك هنا</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <input placeholder="اسم المرسل">
    <input placeholder="المبلغ">
    <input placeholder="رقم العملية">
    <input type="file">
    <button onclick="alert('تم الإرسال')">إرسال</button>
  </div>

</div>

<div id="shamcashPage" style="display:none; padding:15px;">

  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>شام كاش</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <div>💳 رقم الحساب: 123456789</div>
    <div>👤 الاسم: اسمك هنا</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <input placeholder="اسم المرسل">
    <input placeholder="المبلغ">
    <input placeholder="رقم العملية">
    <input type="file">
    <button onclick="alert('تم الإرسال')">إرسال</button>
  </div>

</div>

<h3>إدخال ID</h3>
<input id="userId">
<button onclick="confirmBuy()">تأكيد</button>

<script>

function hideAll(){
home.style.display="none";
appPage.style.display="none";
ordersPage.style.display="none";
balancePage.style.display="none";
chargePage.style.display="none";
favPage.style.display="none";

/* ✅ الإصلاح */
ziraatPage.style.display="none";
shamcashPage.style.display="none";
}

function openShamCash(){
  hideAll();
  shamcashPage.style.display = "block";
}

function openZiraat(){
  hideAll();
  ziraatPage.style.display = "block";
}

</script>

</body>
</html>
