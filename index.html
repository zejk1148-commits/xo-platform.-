<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Store</title>

<style>
body{margin:0;font-family:Arial;background:#e0f2fe}

/* HEADER */
.header{
background:#16a34a;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

/* MENU */
.menu{font-size:22px;cursor:pointer}
.balance{font-weight:bold}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;right:0;
width:250px;height:100%;
background:white;
transform:translateX(100%);
transition:.3s;
z-index:1000;
padding:10px;
}

.sidebar a{
display:block;
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.app{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
position:relative;
}

.heart{
position:absolute;
top:5px;left:5px;
cursor:pointer;
}
.heart.active{color:red}

/* TABLE */
table{width:100%;background:white;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:6px;text-align:center}

button{
padding:5px;
cursor:pointer;
margin:2px;
}

input{
padding:8px;
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="menu" onclick="openMenu()">☰</div>
<div id="balanceText">0$</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a onclick="show('home')">الرئيسية</a>
<a onclick="show('favorites')">المفضلة</a>
<a onclick="show('wallet')">المحفظة</a>
<a onclick="show('redeem')">شحن</a>
<a onclick="show('admin')">لوحة الأدمن</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HOME -->
<div id="home" class="page active">
<div class="apps" id="apps"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="page">
<h3>المفضلة ❤️</h3>
<div id="favList"></div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<h3>المحفظة 💼</h3>
<div id="walletList"></div>
</div>

<!-- REDEEM -->
<div id="redeem" class="page">
<h3>شحن رصيد 💳</h3>
<input id="codeInput" placeholder="أدخل الكود">
<button onclick="redeemCode()">تفعيل</button>
</div>

<!-- ADMIN PANEL (HIDDEN LOGIC) -->
<div id="admin" class="page">
<h2>لوحة التحكم 👑</h2>

<h3>المستخدمين</h3>
<table>
<tr><th>ID</th><th>Admin</th><th>Ban</th><th>Actions</th></tr>
<tbody id="usersTable"></tbody>
</table>

<h3>إنشاء كود شحن</h3>
<input id="amount" placeholder="المبلغ">
<button onclick="createCode()">إنشاء كود</button>

<div id="codesList"></div>
</div>

<script>

/* DATA */
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || [];
let codes = JSON.parse(localStorage.getItem("codes")) || {};
let users = JSON.parse(localStorage.getItem("users")) || [];

/* USER ID */
let myId = localStorage.getItem("myId");
if(!myId){
myId = "U"+Math.floor(Math.random()*999999);
localStorage.setItem("myId",myId);
}

/* add user */
if(!users.find(u=>u.id===myId)){
users.push({id:myId,admin:false,banned:false});
saveUsers();
}

/* SAVE */
function saveUsers(){
localStorage.setItem("users",JSON.stringify(users));
}

/* APPS */
const apps = ["yaahlan","sugo","4fun","soul","xena","vip","chat","game"];

function renderApps(){
let box=document.getElementById("apps");
box.innerHTML="";
apps.forEach(a=>{
box.innerHTML+=`
<div class="app" onclick="openApp('${a}')">
<div class="heart ${favorites.includes(a)?'active':''}" onclick="toggleFav(event,'${a}')">❤</div>
<div>${a}</div>
</div>`;
});
}

/* FAVORITES */
function toggleFav(e,id){
e.stopPropagation();
if(favorites.includes(id)){
favorites=favorites.filter(x=>x!==id);
}else{
favorites.push(id);
}
localStorage.setItem("favorites",JSON.stringify(favorites));
renderApps();
renderFav();
}

function renderFav(){
document.getElementById("favList").innerHTML =
favorites.length ? favorites.join("<br>") : "فارغ";
}

/* WALLET */
function renderWallet(){
document.getElementById("walletList").innerHTML = balance + "$";
}

/* MENU */
function openMenu(){
sidebar.style.transform="translateX(0)";
overlay.style.display="block";
}
function closeMenu(){
sidebar.style.transform="translateX(100%)";
overlay.style.display="none";
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
renderUsers();
renderCodes();
}

/* REDEEM */
function redeemCode(){
let code=document.getElementById("codeInput").value.trim();

if(usedCodes.includes(code)){
return alert("مستخدم مسبقاً");
}

if(codes[code]){
balance += parseFloat(codes[code]);
usedCodes.push(code);

localStorage.setItem("balance",balance);
localStorage.setItem("usedCodes",JSON.stringify(usedCodes));

updateBalance();
renderWallet();

alert("تم الشحن +" + codes[code] + "$");
}else{
alert("كود خاطئ");
}
}

/* UPDATE BALANCE */
function updateBalance(){
document.getElementById("balanceText").innerText = balance + "$";
}

/* CREATE CODE (ADMIN) */
function createCode(){
let amount=document.getElementById("amount").value;
if(!amount) return;

let code="XO-"+Math.random().toString(36).substring(2,8).toUpperCase();

codes[code]=amount;
localStorage.setItem("codes",JSON.stringify(codes));

renderCodes();
}

/* SHOW CODES */
function renderCodes(){
let box=document.getElementById("codesList");
box.innerHTML="<h4>الأكواد</h4>";
for(let c in codes){
box.innerHTML+=`<div>${c} = ${codes[c]}$</div>`;
}
}

/* USERS ADMIN */
function renderUsers(){
let box=document.getElementById("usersTable");
box.innerHTML="";

users.forEach(u=>{
box.innerHTML+=`
<tr>
<td>${u.id}</td>
<td>${u.admin?"👑":"❌"}</td>
<td>${u.banned?"⛔":"✔"}</td>
<td>
<button onclick="toggleAdmin('${u.id}')">Admin</button>
<button onclick="toggleBan('${u.id}')">Ban</button>
<button onclick="deleteUser('${u.id}')">X</button>
</td>
</tr>`;
});
}

function toggleAdmin(id){
let u=users.find(x=>x.id===id);
u.admin=!u.admin;
saveUsers();
renderUsers();
}

function toggleBan(id){
let u=users.find(x=>x.id===id);
u.banned=!u.banned;
saveUsers();
renderUsers();
}

function deleteUser(id){
users=users.filter(x=>x.id!==id);
saveUsers();
renderUsers();
}

/* INIT */
renderApps();
renderFav();
renderWallet();
updateBalance();

</script>

</body>
</html>
