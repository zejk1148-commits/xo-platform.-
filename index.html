<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>متجر التطبيقات</title>

<style>
html, body {
  margin:0 !important;
  padding:0 !important;
  font-family:Arial;
  direction:rtl;
  background:#f5f5f5;
}

/* ✅ حذف التثبيت الغلط */
body{
  position: relative;
}

/* 🔥 رفع خفيف للهيدر بدون ما يختفي */
.header{
  background:linear-gradient(to left,#2ecc71,#27ae60);
  color:white;
  padding:12px;
  padding-top:22px; /* تعويض */
  margin-top:-10px; /* رفع خفيف */
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

/* 🔥 زر القائمة واضح */
.header div:first-child{
  z-index:999999;
  position:relative;
  font-size:20px;
}

/* باقي الكود مثل ما هو */
.sidebar{
  position:fixed;
  top:0;
  right:0;
  width:190px;
  height:100%;
  background:#1e1e2f;
  color:white;
  padding:15px;
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
}
.sidebar.open{transform:translateX(0);}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  background:#2c2c44;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:9998;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(80px, 1fr));
  gap:10px;
  padding:10px;
}

#balancePage .grid{
  grid-template-columns:repeat(2,1fr);
} 

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:60px;
  height:60px;
  border-radius:14px;
  object-fit:cover;
}

.card-name{
  font-size:13px;
  margin-top:5px;
  font-weight:bold;
}

.heart{
  position:absolute;
  top:5px;
  left:5px;
  font-size:18px;
  cursor:pointer;
}

.pack-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.pack-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.buy-btn{
  margin-top:10px;
  background:#2ecc71;
  color:white;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:85%;
  max-width:260px;
  position:relative;
}

.close-btn{
  position:absolute;
  top:8px;
  left:10px;
  font-size:18px;
  cursor:pointer;
}

.modal input{
  width:90%;
  padding:8px;
  margin:10px auto;
  display:block;
}

.modal button{
  display:block;
  margin:10px auto 0;
  background:#2ecc71;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h3 style="text-align:center;">القائمة</h3>

  <a onclick="goHome()">🏠 الرئيسية</a>
  <a onclick="openBalance()">💰 إضافة رصيد</a>
  <a onclick="openCharge()">💳 شحن</a>
  <a onclick="openOrders()">📦 طلباتي</a>
  <a onclick="openFav()">❤️ المفضلة</a>
</div>

<div class="overlay" id="overlay"></div>

<div id="home">
<div class="header">
<div onclick="toggleSidebar()">☰</div>

<div style="display:flex; gap:10px; align-items:center;">
  <div id="appTitle" style="display:none;"></div>
  <div id="balanceText">الرصيد: $120</div>
</div>

</div>

<div class="grid" id="appsGrid"></div>
</div>

<div id="appPage" style="display:none">
<div class="header">
<div onclick="back()">رجوع</div>
<div id="appName"></div>
</div>
<div id="packs"></div>
</div>

<div id="ordersPage" style="display:none"></div>

<!-- 🔥 صفحات الرصيد -->
<div id="balancePage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="goHome()">رجوع</div>
    <div>إضافة رصيد</div>
  </div>

  <div class="grid">

    <div class="card" onclick="openShamCash()">
      <img src="https://i.ibb.co/fY1MpH8d/IMG.jpg">
      <div class="card-name">شام كاش</div>
    </div>

    <div class="card" onclick="openZiraat()">
      <img src="https://i.ibb.co/qzq6hMN/IMG.jpg">
      <div class="card-name">زراعات بنك</div>
    </div>

  </div>
</div>

<!-- 🔥 صفحة زراعات بنك -->
<div id="ziraatPage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="openBalance()">رجوع</div>
    <div>زراعات بنك</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <div>💳 رقم الحساب: 987654321</div>
    <div>👤 الاسم: اسمك هنا</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <input placeholder="اسم المرسل">
    <input placeholder="المبلغ">
    <input placeholder="رقم العملية">
    <input type="file">
    <button onclick="alert('تم الإرسال')">إرسال</button>
  </div>
</div>

<!-- 🔥 صفحة شام كاش -->
<div id="shamcashPage" style="display:none; padding:15px;">
  <div class="header">
    <div onclick="openBalance()">رجوع</div>
    <div>شام كاش</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <div>💳 رقم الحساب: 123456789</div>
    <div>👤 الاسم: اسمك هنا</div>
  </div>

  <div style="background:white;padding:15px;border-radius:12px;margin:10px 0;">
    <input placeholder="اسم المرسل">
    <input placeholder="المبلغ">
    <input placeholder="رقم العملية">
    <input type="file">
    <button onclick="alert('تم الإرسال')">إرسال</button>
  </div>
</div>

</div>

<h3>إدخال ID</h3>
<input id="userId">
<button onclick="confirmBuy()">تأكيد</button>

</div>
</div>

<script>
function openShamCash(){
  hideAll();
  document.getElementById("shamcashPage").style.display = "block";
}

function openZiraat(){
  hideAll();
  document.getElementById("ziraatPage").style.display = "block";
  }
/* 🔥 منع double tap zoom */
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  let now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

/* 🔥 منع gesture zoom */
document.addEventListener('gesturestart', function (e) {
  e.preventDefault();
});

/* 💰 الرصيد */
let balance = parseFloat(localStorage.getItem("balance")) || 120;

function updateBalance(){
balanceText.innerText = "الرصيد: $" + balance;
}
updateBalance();

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("open");
  overlay.style.display = sidebar.classList.contains("open") ? "block" : "none";
}
overlay.onclick=()=>{
  sidebar.classList.remove("open");
  overlay.style.display="none";
}

/* APPS */
const apps = [
{id:"yaahlan", name:"يا أهلا", img:"https://i.ibb.co/G307spDQ/image.png",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10},
  {amount:10600, price:20},
  {amount:27000, price:50},
  {amount:40000, price:75},
  {amount:52500, price:100}
const apps = [

{
id:"zinalive",
name:"Zina Live",
img:"https://i.ibb.co/gM9GsQbt/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10},
  {amount:10600, price:20}
]
},

{
id:"sugo",
name:"Sugo",
img:"https://i.ibb.co/qVF1fnS/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10},
  {amount:10600, price:20}
]
},

{
id:"yoparty",
name:"YoParty",
img:"https://i.ibb.co/8n3DfwWT/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10}
]
},

{
id:"4fun",
name:"4fun",
img:"https://i.ibb.co/7tJjGrsn/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10}
]
},

{
id:"soltchen",
name:"Soltchen",
img:"https://i.ibb.co/TMqz7RhY/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10}
]
},

{
id:"soulstar",
name:"Soul Star",
img:"https://i.ibb.co/VW6061sh/image.jpg",
packs:[
  {amount:2500, price:5},
  {amount:5200, price:10}
]
}

];

let favorites = JSON.parse(localStorage.getItem("fav")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
// 🔥 حذف الطلبات يومياً
let lastClear = localStorage.getItem("lastClearDate");
let today = new Date().toDateString();

if(lastClear !== today){
  orders = [];
  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("lastClearDate", today);
}
function toggleFav(id){
if(favorites.includes(id)){
favorites = favorites.filter(x=>x!==id);
}else{
favorites.push(id);
}
localStorage.setItem("fav", JSON.stringify(favorites));
loadApps();
}

function loadApps(){
let html="";
apps.forEach(app=>{
let heart = favorites.includes(app.id) ? "❤️" : "🤍";

html+=`
<div class="card">
<div class="heart" onclick="toggleFav('${app.id}')">${heart}</div>
<div onclick="openApp('${app.id}')">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>
</div>`;
});
appsGrid.innerHTML=html;
}
loadApps();

function hideAll(){
  home.style.display="none";
  appPage.style.display="none";
  ordersPage.style.display="none";
  balancePage.style.display="none";
  chargePage.style.display="none";
  favPage.style.display="none";

  // 🔥 أهم إضافة
  ziraatPage.style.display="none";
  shamcashPage.style.display="none";
}

function goHome(){
hideAll();
home.style.display="block";
appTitle.style.display="none";
}

function openBalance(){hideAll();balancePage.style.display="block";}
function openCharge(){hideAll();chargePage.style.display="block";}
function back(){goHome();}

let currentApp="";
let selectedPack=0;

function openApp(id){
hideAll();
appPage.style.display="block";

let app = apps.find(a=>a.id===id);

currentApp = app.name;
appName.innerText = app.name;

appTitle.innerText = app.name;
appTitle.style.display = "block";

let html="<div class='pack-grid'>";
app.packs.forEach(p=>{

let amount = typeof p === "object" ? p.amount : p;
let price  = typeof p === "object" ? p.price  : (p/500);

html+=`
<div class="pack-card">
<div>${amount} 💎</div>
<div>$${price}</div>
<div class="buy-btn" onclick="openBuy(${amount})">شراء</div>
</div>`;
});
html+="</div>";

packs.innerHTML=html;
}

function openBuy(p){
selectedPack=p;
modal.style.display="flex";
}

function confirmBuy(){
let id=userId.value;
if(!id){alert("اكتب ID");return;}

let price = selectedPack/500;

if(balance < price){
alert("رصيدك لا يكفي ❌");
return;
}

balance -= price;
localStorage.setItem("balance", balance);
updateBalance();

orders.push({
app: currentApp,
pack: selectedPack,
price: price,
id: id,
date: new Date().toLocaleString()
});
localStorage.setItem("orders", JSON.stringify(orders));

alert("تم الطلب ✅");
modal.style.display="none";
userId.value="";
}

function closeModal(){
modal.style.display="none";
}

function openFav(){
hideAll();
favPage.style.display="block";

let favApps = apps.filter(a=>favorites.includes(a.id));

let html="<div class='header'><div onclick='goHome()'>رجوع</div><div>المفضلة</div></div>";

if(favApps.length===0){
html+="<h3 style='padding:10px'>لا يوجد مفضلة ❤️</h3>";
}else{
html+="<div class='grid'>";
favApps.forEach(app=>{
html+=`
<div class="card" onclick="openApp('${app.id}')">
<img src="${app.img}">
<div class="card-name">${app.name}</div>
</div>`;
});
html+="</div>";
}

favPage.innerHTML=html;
}

function openOrders(){
hideAll();
ordersPage.style.display="block";

let html="<div class='header'><div onclick='goHome()'>رجوع</div><div>طلباتي</div></div>";

if(orders.length === 0){
html+="<h3 style='padding:10px'>لا يوجد طلبات 📦</h3>";
}else{
orders.slice().reverse().forEach(o=>{
html+=`
<div style="background:white;margin:10px;padding:10px;border-radius:10px">
<div>📱 ${o.app}</div>
<div>💎 ${o.pack}</div>
<div>💰 $${o.price}</div>
<div>🆔 ${o.id}</div>
<div style="font-size:12px;color:gray">${o.date}</div>
</div>
`;
});
}

ordersPage.innerHTML=html;
}

</script>

</body>
</html>
