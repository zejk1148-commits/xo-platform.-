<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة شحن</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

/* الشريط العلوي */
.topbar {
  background: #000;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-btn {
  font-size: 20px;
  cursor: pointer;
}

/* الشريط الجانبي */
.sidebar {
  position: fixed;
  right: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: #000;
  transform: translateX(100%);
  transition: 0.3s;
  padding: 20px;
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar ul li {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.sidebar ul li:hover {
  background: #222;
}

/* الصفحات */
.page {
  display: none;
  padding: 20px;
}

.page.active {
  display: block;
}

/* الكروت */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.card {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.card:hover {
  background: #333;
}
</style>
</head>

<body>

<!-- الشريط العلوي -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  <div>💰 الرصيد: 0$</div>
</div>

<!-- الشريط الجانبي -->
<div id="sidebar" class="sidebar">
  <ul>
    <li onclick="showPage('home')">🏠 الرئيسية</li>
    <li onclick="showPage('add')">💰 إضافة رصيد</li>
    <li onclick="showPage('orders')">📦 طلباتي</li>
    <li onclick="showPage('wallet')">👛 محفظتي</li>
  </ul>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">
  <h2>🔥 الخدمات</h2>

  <div class="grid">
    <div class="card">🎤 تطبيقات الدردشة الصوتية</div>
    <div class="card">🎮 الألعاب</div>
    <div class="card">💎 خدمات مميزة</div>
    <div class="card">📱 تطبيقات أخرى</div>
  </div>
</div>

<!-- إضافة رصيد -->
<div id="add" class="page">
  <h2>💰 إضافة رصيد</h2>
  <p>هنا تضيف الرصيد</p>
</div>

<!-- الطلبات -->
<div id="orders" class="page">
  <h2>📦 طلباتي</h2>
  <p>هنا تظهر الطلبات</p>
</div>

<!-- المحفظة -->
<div id="wallet" class="page">
  <h2>👛 محفظتي</h2>
  <p>هنا معلومات المحفظة</p>
</div>

<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

function showPage(id) {
  let pages = document.querySelectorAll(".page");
  pages.forEach(p => p.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  // يسكر الشريط بعد الضغط
  document.getElementById("sidebar").classList.remove("active");
}
</script>

</body>
</html>
