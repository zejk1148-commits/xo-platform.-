<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash App UI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: linear-gradient(to left, #2ecc71, #27ae60);
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.balance {
  display: flex;
  align-items: center;
  gap: 8px;
}

.add-btn {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  background: white;
  color: green;
  border: none;
}

/* بانر */
.banner {
  background: white;
  margin: 10px;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

/* بحث */
.search {
  margin: 10px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

/* كروت */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: linear-gradient(to left, #3498db, #2ecc71);
  color: white;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
}

/* الصفحات */
.page { display: none; }
.active { display: block; }

/* فورم */
.form-box {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

/* زر عائم */
.floating {
  position: fixed;
  bottom: 80px;
  left: 20px;
  width: 50px;
  height: 50px;
  background: #2ecc71;
  border-radius: 50%;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 25px;
}

/* القائمة السفلية */
.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to left, #3498db, #2ecc71);
  display: flex;
  justify-content: space-around;
  padding: 10px;
  color: white;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>☰</div>
  <div class="balance">
    <span>$0.981</span>
    <button class="add-btn" onclick="showPage('addBalance')">+</button>
  </div>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">

<div class="banner">
  <img src="https://via.placeholder.com/300x100" width="100%">
</div>

<div class="search">
  <input placeholder="بحث">
</div>

<div class="grid">
  <div class="card">قسم الألعاب</div>
  <div class="card">تطبيقات الشات</div>
  <div class="card">البنوك الرقمية</div>
  <div class="card" onclick="showPage('addBalance')">قسم الرصيد</div>
</div>

</div>

<!-- إضافة الرصيد -->
<div id="addBalance" class="page">
  <div class="form-box">
    <h3>إضافة الرصيد</h3>

    <div onclick="selectMethod('ziraat')" class="card">بنك زراعات</div>
    <div onclick="selectMethod('sham')" class="card">شام كاش</div>

    <div id="details"></div>
  </div>
</div>

<!-- زر عائم -->
<div class="floating" onclick="showPage('addBalance')">+</div>

<!-- القائمة السفلية -->
<div class="bottom">
  <div onclick="showPage('home')">🏠</div>
  <div>🛒</div>
  <div>🔔</div>
  <div>👤</div>
</div>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectMethod(type){
  let info = type==="ziraat"
  ? "<p>IBAN: TRXXXX</p>"
  : "<p>شام كاش: 09XXXX</p>";

  document.getElementById("details").innerHTML = `
    ${info}
    <input id="name" placeholder="اسمك">
    <input id="amount" placeholder="المبلغ">
    <input id="txid" placeholder="رقم العملية">
    <input type="file" id="receipt">
    <button onclick="sendData('${type}')">إرسال</button>
  `;
}

async function sendData(type){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;
  let txid = document.getElementById("txid").value;
  let file = document.getElementById("receipt").files[0];

  let BOT_TOKEN = "PUT_TOKEN";
  let CHAT_ID = "PUT_ID";

  let caption = `طلب جديد
${name}
${amount}
${txid}
${type}`;

  if(file){
    let form = new FormData();
    form.append("chat_id", CHAT_ID);
    form.append("photo", file);
    form.append("caption", caption);

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
      method:"POST",
      body: form
    });
  }
}
</script>

</body>
</html>
